name: Build surface records

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download Sackmann CSVs via GitHub API (authenticated, reliable)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p atp wta
          dl() {  # $1=repo  $2=filename  $3=outdir
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.raw" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/JeffSackmann/$1/contents/$2?ref=master" \
              -o "$3/$2"
          }
          for y in $(seq 2015 2026); do
            dl tennis_atp "atp_matches_${y}.csv" atp || rm -f "atp/atp_matches_${y}.csv"
            dl tennis_wta "wta_matches_${y}.csv" wta || rm -f "wta/wta_matches_${y}.csv"
          done
          find atp wta -type f -empty -delete || true
          echo "Downloaded:"; ls -la atp wta
          if [ -z "$(ls -A atp)" ] && [ -z "$(ls -A wta)" ]; then
            echo "ERROR: no CSVs downloaded"; exit 1
          fi

      - name: Build surface_records.json
        run: |
          python build_surface_records.py \
            --from-dir atp \
            --from-dir wta \
            --start 2015 \
            --out surface_records.json
          echo "Generated file size:"; ls -la surface_records.json

      - name: Commit the data file if it changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf atp wta
          git add surface_records.json
          if git diff --staged --quiet; then
            echo "No changes to surface_records.json."
          else
            git commit -m "data: refresh surface_records.json [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          fi
