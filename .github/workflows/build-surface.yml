name: Build surface records

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download Sackmann data (tarballs, no auth needed)
        run: |
          for repo in tennis_atp tennis_wta; do
            curl -fsSL -o "$repo.tgz" \
              "https://codeload.github.com/JeffSackmann/$repo/tar.gz/refs/heads/master"
            tar xzf "$repo.tgz"
          done
          ls -d tennis_*-master

      - name: Build surface_records.json
        run: |
          python build_surface_records.py \
            --from-dir tennis_atp-master \
            --from-dir tennis_wta-master \
            --start 2015 \
            --out surface_records.json
          echo "Generated file size:"; ls -la surface_records.json

      - name: Commit the data file if it changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf tennis_atp-master tennis_wta-master tennis_atp.tgz tennis_wta.tgz
          git add surface_records.json
          if git diff --staged --quiet; then
            echo "No changes to surface_records.json."
          else
            git commit -m "data: refresh surface_records.json [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          fi
