name: Build surface records

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Get ATP data (Sackmann)
        uses: actions/checkout@v4
        with:
          repository: JeffSackmann/tennis_atp
          path: _data/tennis_atp

      - name: Get WTA data (Sackmann)
        uses: actions/checkout@v4
        with:
          repository: JeffSackmann/tennis_wta
          path: _data/tennis_wta

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build surface_records.json
        run: |
          echo "ATP files:"; ls _data/tennis_atp/atp_matches_2024.csv 2>/dev/null || echo "  (2024 not found)"
          python build_surface_records.py \
            --from-dir _data/tennis_atp \
            --from-dir _data/tennis_wta \
            --start 2015 \
            --out surface_records.json
          echo "Generated file size:"; ls -la surface_records.json

      - name: Commit the data file if it changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf _data
          git add surface_records.json
          if git diff --staged --quiet; then
            echo "No changes to surface_records.json."
          else
            git commit -m "data: refresh surface_records.json [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          fi
