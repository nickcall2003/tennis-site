name: Daily Discord posts

# Auto-posts Line Logic content to Discord:
#   - morning: today's model picks
#   - late night: recap of the day's graded results
#
# Setup (one time):
#   1. In Railway, set env var PROMO_CRON_TOKEN to any long random string.
#   2. In GitHub: repo Settings -> Secrets and variables -> Actions -> New
#      repository secret, name it PROMO_CRON_TOKEN, paste the SAME string.
#   3. Make sure DISCORD_WEBHOOK_URL is set in Railway.
#
# Times are UTC (GitHub cron is always UTC). These map to roughly:
#   14:00 UTC ~ 9:00 AM Central (picks)
#   04:30 UTC ~ 11:30 PM Central previous day (recap)
# Central shifts by an hour with daylight saving; adjust the cron if you like.

on:
  schedule:
    - cron: "0 14 * * *"     # picks
    - cron: "30 4 * * *"     # recap
  workflow_dispatch:
    inputs:
      kind:
        description: "Which post to send"
        required: true
        default: "picks"
        type: choice
        options: [picks, recap]

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          TOKEN: ${{ secrets.PROMO_CRON_TOKEN }}
          SITE: https://www.thelinelogic.com
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_KIND: ${{ github.event.inputs.kind }}
        run: |
          set -e
          if [ -n "$MANUAL_KIND" ]; then
            KIND="$MANUAL_KIND"
          elif [ "$SCHEDULE" = "30 4 * * *" ]; then
            KIND="recap"
          else
            KIND="picks"
          fi
          echo "Posting kind=$KIND"
          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            "$SITE/api/promo/discord?kind=$KIND" \
            -H "X-Promo-Token: $TOKEN")
          echo "HTTP $HTTP"; cat /tmp/resp.json
          # fail the run if the API reported an error so it shows up red in Actions
          grep -q '"ok": true' /tmp/resp.json || grep -q '"ok":true' /tmp/resp.json
