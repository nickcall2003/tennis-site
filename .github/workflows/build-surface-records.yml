name: Build surface records

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

concurrency:
  group: build-surface
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get Sackmann data (tarball over HTTPS, clone as fallback)
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -o pipefail
          get () {
            echo "fetching $1 ..."
            if curl -fsSL "https://github.com/JeffSackmann/$1/archive/refs/heads/master.tar.gz" | tar xz; then
              mv "$1-master" "$1"
            else
              echo "tarball failed for $1, trying anonymous clone"
              git -c http.https://github.com/.extraheader= -c credential.helper= \
                  clone --depth 1 "https://github.com/JeffSackmann/$1.git"
            fi
            echo "$1: $(ls "$1"/*.csv 2>/dev/null | wc -l) csv files"
          }
          get tennis_atp
          get tennis_wta

      - name: Build surface_records.json (ATP + WTA)
        run: python build_surface_records.py --start 2015 --from-dir tennis_atp --from-dir tennis_wta

      - name: Verify build is healthy
        run: |
          python - <<'PY'
          import json, sys
          d = json.load(open("surface_records.json"))
          women = [k for k in d if any(w in k for w in
                   ("swiatek","sabalenka","gauff","rybakina","pegula"))]
          print(f"players: {len(d):,}")
          print(f"WTA spot-check present: {women}")
          if len(d) < 1500:
              sys.exit("REFUSING TO COMMIT: too few players.")
          if not women:
              sys.exit("REFUSING TO COMMIT: no WTA players found.")
          PY

      - name: Remove data folders before committing
        run: rm -rf tennis_atp tennis_wta

      - name: Commit & push
        run: |
          if git diff --quiet -- surface_records.json; then
            echo "No changes"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add surface_records.json
          git commit -m "Rebuild surface_records.json (ATP + WTA)"
          for i in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "pushed"; exit 0
            fi
            echo "push race, retry $i"; sleep 4
          done
          echo "could not push"; exit 1
