<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Baseline — Tennis Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesque:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#100e0b;--panel:#191510;--panel-2:#211b14;--panel-3:#2a2117;--line:#33291d;
    --ink:#f3ead9;--muted:#9a8c76;--muted-2:#6f6354;--clay:#c8612f;--clay-bright:#e6743a;
    --grass:#5b8c4e;--win:#8bbf7a;--loss:#d2685f;--live:#e6743a;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(130% 80% at 82% -8%,#1c160f 0%,var(--bg) 55%);
    color:var(--ink);font-family:"Hanken Grotesque",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  .shell{max-width:1180px;margin:0 auto;padding:34px 20px 90px;display:grid;
    grid-template-columns:248px 1fr;gap:26px}
  @media(max-width:820px){.shell{grid-template-columns:1fr;gap:14px}.side{order:2}}
  header.top{grid-column:1/-1;display:flex;align-items:baseline;justify-content:space-between;gap:14px}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(30px,6vw,48px);letter-spacing:-.02em;margin:0;cursor:pointer}
  h1 .dot{color:var(--clay)}
  .acc-badge{display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;padding:9px 14px}
  .acc-badge .ring{font-family:"Fraunces",serif;font-weight:900;font-size:22px;color:var(--clay-bright);line-height:1}
  .acc-badge .lab{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:1.4}
  .side{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:16px;padding:16px;align-self:start;position:sticky;top:20px}
  .side h3{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin:2px 0 12px}
  .t-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;cursor:pointer;
    font-size:13.5px;transition:.12s;margin-bottom:2px}
  .t-item:hover{background:var(--panel-3)}
  .t-item.active{background:var(--clay);color:#1a120b;font-weight:600}
  .t-item .dotmark{width:7px;height:7px;border-radius:50%;background:var(--clay);flex:none}
  .t-item.active .dotmark{background:#1a120b}
  .t-item .cnt{margin-left:auto;font-family:"Space Mono",monospace;font-size:11px;color:var(--muted)}
  .t-item.active .cnt{color:#1a120b}
  .t-item .livedot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite;flex:none}
  .datebar{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .arrow{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:15px}
  .pill{background:transparent;border:1px solid var(--line);color:var(--muted);padding:6px 11px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
  .pill.active{background:var(--clay);border-color:var(--clay);color:#1a120b}
  .pill .d2{display:block;font-family:"Space Mono",monospace;font-size:9.5px;opacity:.7;margin-top:1px}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600}
  .tab.active{background:var(--panel-3);border-color:#56442f;color:var(--ink)}
  .tab .lv{color:var(--live)}
  .bubbles{display:flex;gap:12px;margin-bottom:18px}
  .bubble{flex:1;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center}
  .bubble .num{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(22px,5vw,32px);line-height:1}
  .bubble .lab{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .bubble.won .num{color:var(--win)} .bubble.acc .num{color:var(--clay-bright)}
  .section-h{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted-2);margin:22px 0 10px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:13px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:#4a3b29}
  .card.correct{border-left:3px solid var(--win)} .card.wrong{border-left:3px solid var(--loss)} .card.live{border-left:3px solid var(--live)}
  .card.big{background:linear-gradient(180deg,#221a11,#1b1610)}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .tier{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;letter-spacing:.1em;padding:3px 6px;border-radius:5px;color:#1a120b;background:var(--clay)}
  .tier.WTA{background:#c06a93}.tier.CHALLENGER{background:var(--grass)}
  .tourn{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .status{margin-left:auto;display:flex;align-items:center;gap:7px;font-family:"Space Mono",monospace;font-size:11px}
  .live-tag{color:var(--live);text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(230,116,58,.6)}70%{box-shadow:0 0 0 8px rgba(230,116,58,0)}100%{box-shadow:0 0 0 0 rgba(230,116,58,0)}}
  .sched{color:var(--muted)}
  .mark{font-size:15px;font-weight:700;width:22px;height:22px;border-radius:50%;display:grid;place-items:center}
  .mark.ok{color:var(--win);background:rgba(139,191,122,.12)}.mark.no{color:var(--loss);background:rgba(210,104,95,.12)}
  .row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:4px 0}
  .pname{font-size:15.5px;font-weight:500}
  .pname .pick{font-size:9px;font-family:"Space Mono",monospace;color:var(--clay-bright);border:1px solid #56442f;border-radius:4px;padding:1px 5px;margin-left:7px;vertical-align:middle}
  .serving::after{content:"\25CF";color:var(--clay-bright);font-size:8px;margin-left:6px;vertical-align:middle}
  .winner{color:var(--win);font-weight:700}
  .sets{font-family:"Space Mono",monospace;font-size:14px;letter-spacing:.14em;font-variant-numeric:tabular-nums}
  .game{font-family:"Space Mono",monospace;font-size:14px;font-weight:700;min-width:26px;text-align:right;color:var(--clay-bright)}
  .pred{display:flex;margin-top:11px;height:24px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .pred .bar{height:100%;display:flex;align-items:center;padding:0 8px;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;white-space:nowrap}
  .pred .a{background:rgba(200,97,47,.26)}.pred .b{background:rgba(255,255,255,.045);color:var(--muted);justify-content:flex-end}
  .lowconf{font-size:9.5px;font-family:"Space Mono",monospace;color:var(--muted-2);border:1px solid var(--line);border-radius:4px;padding:1px 5px}
  .empty{color:var(--muted);text-align:center;padding:46px 0;font-style:italic}
  .detail{grid-column:1/-1;display:none}
  .back{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;margin-bottom:18px}
  .d-head{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
  .d-meta{display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap}
  .d-score{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:3px 0}
  .d-pname{font-family:"Fraunces",serif;font-size:22px;font-weight:600}
  .d-sets{font-family:"Space Mono",monospace;font-size:20px;letter-spacing:.2em}
  .d-pred{display:flex;height:30px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin-top:16px}
  .d-pred .bar{height:100%;display:flex;align-items:center;padding:0 11px;font-family:"Space Mono",monospace;font-size:12.5px;font-weight:700}
  .d-pred .a{background:rgba(200,97,47,.28)}.d-pred .b{background:rgba(255,255,255,.05);color:var(--muted);justify-content:flex-end}
  .d-tabs{display:flex;gap:8px;margin-bottom:14px}
  .d-tab{background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px 18px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600}
  .d-tab.active{background:var(--clay);border-color:var(--clay);color:#1a120b}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px}
  .analysis{font-family:"Fraunces",serif;font-size:16px;line-height:1.6;color:#e4d8c2}
  .meta-line{margin-top:16px;font-size:13.5px;color:var(--muted);line-height:1.7}
  .meta-line b{color:var(--ink)}
  .form-pills{display:inline-flex;gap:4px;margin-left:4px}
  .fp{font-family:"Space Mono",monospace;font-size:10px;width:18px;height:18px;border-radius:4px;display:inline-grid;place-items:center}
  .fp.w{background:rgba(139,191,122,.18);color:var(--win)}.fp.l{background:rgba(210,104,95,.16);color:var(--loss)}
  .stat-sec{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted-2);text-align:center;margin:20px 0 12px}
  .stat{margin-bottom:15px}
  .stat-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:5px}
  .stat-top .lab{color:var(--muted);font-size:12px}
  .stat-top .v{font-weight:700;font-variant-numeric:tabular-nums}
  .stat-top .v.dim{color:var(--muted-2);font-weight:400}
  .stat-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--panel-3)}
  .stat-bar .a{background:var(--clay)}.stat-bar .b{background:#5a4632}
  .stat-na{text-align:center;color:var(--muted-2);font-size:12px;font-style:italic;padding:6px 0}
  .note{font-size:11.5px;color:var(--muted-2);line-height:1.6;margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
  footer{grid-column:1/-1;margin-top:30px;color:var(--muted-2);font-size:11px;line-height:1.6;border-top:1px solid var(--line);padding-top:16px}
  .sport-tag{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--clay-bright);border:1px solid #56442f;border-radius:6px;padding:3px 9px;vertical-align:middle}
  .head-right{display:flex;align-items:center;gap:12px}
  .menu-wrap{position:relative}
  .menu-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);font-size:20px;width:44px;height:44px;border-radius:12px;cursor:pointer;line-height:1}
  .menu-btn:hover{border-color:var(--clay)}
  .menu{position:absolute;right:0;top:52px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:6px;min-width:160px;display:none;z-index:30;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .menu.open{display:block}
  .menu-item{padding:11px 14px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600}
  .menu-item:hover{background:var(--panel-3)}
  .menu-item.active{background:var(--clay);color:#1a120b}
  /* MLB cards */
  .mlb-card{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin:10px 0 0}
  .mlb-team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .mlb-team img{width:52px;height:52px;object-fit:contain}
  .mlb-team .tname{font-weight:600;font-size:14px}
  .mlb-team .trec{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--muted)}
  .mlb-team .sp{font-size:11.5px;color:var(--muted);line-height:1.3}
  .mlb-team .sp b{color:var(--ink);font-weight:600}
  .mlb-team.win .tname{color:var(--win)}
  .mlb-vs{font-family:"Fraunces",serif;font-size:14px;color:var(--muted-2);display:flex;flex-direction:column;align-items:center;gap:3px}
  .mlb-vs .rs{font-family:"Space Mono",monospace;font-size:22px;font-weight:700;color:var(--ink)}
  .mlb-vs .inn{font-family:"Space Mono",monospace;font-size:10px;color:var(--live)}
  .d-logos{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin:8px 0 4px}
  .d-logos img{width:74px;height:74px;object-fit:contain}
  .fac{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .fac .lab{text-align:center;color:var(--muted);font-size:11.5px;font-family:"Space Mono",monospace;text-transform:uppercase;letter-spacing:.06em}
  .fac .va{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
  .fac .vb{text-align:left;font-weight:600;font-variant-numeric:tabular-nums}
  .proj-runs{margin-top:4px;font-family:"Fraunces",serif;font-weight:900;font-size:24px;color:var(--clay-bright);line-height:1}
  .proj-runs span{display:block;font-family:"Space Mono",monospace;font-size:8.5px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .proj-line{display:flex;align-items:center;justify-content:center;gap:12px;margin:12px 0 2px;
    font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .proj-line .pr{color:var(--ink)}.proj-line .pr b{font-family:"Fraunces",serif;font-size:21px;color:var(--clay-bright);font-weight:900;vertical-align:middle;margin:0 2px}
  .mu-side{margin-bottom:22px}
  .mu-h{font-family:"Fraunces",serif;font-size:17px;font-weight:600;margin-bottom:4px}
  .mu-h span{font-family:"Hanken Grotesque",sans-serif;font-size:13px;color:var(--muted);font-weight:400}
  .bvp-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .bvp-name{font-weight:600}
  .bvp-stat{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);text-align:right;white-space:nowrap}
  .bvp-stat b{color:var(--clay-bright);font-weight:700}
  .bvp-none{font-family:"Space Mono",monospace;font-size:11.5px;color:var(--muted-2);font-style:italic}
  .bvp-note{font-size:11.5px;color:var(--muted-2);margin-bottom:6px}
  .inj-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .inj-name{font-weight:600}
  .inj-pos{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted-2);margin-left:7px;border:1px solid var(--line);border-radius:4px;padding:1px 5px}
  .inj-stat{font-family:"Space Mono",monospace;font-size:11.5px;color:var(--loss);text-align:right}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <h1 id="home-link">Baseline<span class="dot">.</span> <span class="sport-tag" id="sport-tag">Tennis</span></h1>
    <div class="head-right">
      <div class="acc-badge" id="acc-badge" title="Model accuracy, last 30 days">
        <div class="ring" id="acc-ring">&mdash;</div>
        <div class="lab">30-day<br>accuracy</div>
      </div>
      <div class="menu-wrap">
        <button class="menu-btn" id="menu-btn" aria-label="Switch sport">&#9776;</button>
        <div class="menu" id="menu">
          <div class="menu-item" data-sport="tennis">&#127934; Tennis</div>
          <div class="menu-item" data-sport="mlb">&#9918; MLB</div>
        </div>
      </div>
    </div>
  </header>
  <aside class="side" id="side"><h3 id="side-h">Tournaments</h3><div id="t-list"></div></aside>
  <main class="main" id="main">
    <div class="datebar" id="datebar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="bubbles" id="bubbles"></div>
    <div id="list"><div class="empty">Loading&hellip;</div></div>
  </main>
  <section class="detail" id="detail"></section>
  <footer>
    Model picks the higher-probability player; &#10003; = pick won, &#10007; = pick lost. Times shown in Central.
    Not betting advice.
  </footer>
</div>
<script>
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function lastName(n){return (n||"").split(" ").pop();}
function timeStr(m){if(m.event_time)return m.event_time;const d=new Date(m.scheduled);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
let selected=startOfDay(new Date());
let tabMode="all",tFilter=null,current=[];
const byId={};
let detailId=null,detailTab="analysis",detailTimer=null;
async function getJSON(u){const r=await fetch(u);if(!r.ok)throw 0;return r.json();}
async function loadDay(){try{current=await getJSON("/api/matches?date="+ymd(selected));}catch(e){current=[];}for(const k in byId)delete byId[k];current.forEach(m=>byId[m.id]=m);}
async function loadTournaments(){
  let ts=[];try{ts=await getJSON("/api/tournaments?date="+ymd(selected));}catch(e){}
  const el=document.getElementById("t-list");el.innerHTML="";
  const all=document.createElement("div");all.className="t-item"+(tFilter===null?" active":"");
  all.innerHTML='<span class="dotmark"></span>All tournaments<span class="cnt">'+current.length+'</span>';
  all.onclick=()=>{tFilter=null;render();};el.appendChild(all);
  ts.forEach(t=>{const it=document.createElement("div");it.className="t-item"+(tFilter===t.key?" active":"");
    const live=t.live?'<span class="livedot"></span>':'<span class="dotmark"></span>';
    it.innerHTML=live+'<span class="tourn" style="flex:1">'+t.name+'</span><span class="cnt">'+t.count+'</span>';
    it.onclick=()=>{tFilter=t.key;render();};el.appendChild(it);});
}
async function loadAccuracy(){try{const a=await getJSON("/api/accuracy?days=30");
  document.getElementById("acc-ring").textContent=a.accuracy==null?"\u2014":a.accuracy+"%";
  document.getElementById("acc-badge").title="Model: "+a.correct+"/"+a.picks+" correct over last 30 days";}catch(e){}}
function filteredMatches(){return current.filter(m=>{
  if(tFilter!==null&&(m.tournament_key||m.tournament)!==tFilter)return false;
  if(tabMode==="live"&&m.status!=="live")return false;return true;});}
function dayStats(list){let p=0,c=0;list.forEach(m=>{if(m.correct===true||m.correct===false){p++;if(m.correct)c++;}});return{p:p,c:c,acc:p?Math.round(c/p*100):0};}
function renderDatebar(){const bar=document.getElementById("datebar");bar.innerHTML="";
  const prev=document.createElement("button");prev.className="arrow";prev.textContent="\u2039";prev.onclick=()=>{selected=addDays(selected,-1);reload();};bar.appendChild(prev);
  for(let o=-3;o<=3;o++){const d=addDays(startOfDay(new Date()),o);const b=document.createElement("button");b.className="pill"+(ymd(d)===ymd(selected)?" active":"");
    const lab=o===0?"Today":o===-1?"Yest.":o===1?"Tom.":DOW[d.getDay()];
    b.innerHTML=lab+'<span class="d2">'+MON[d.getMonth()]+" "+d.getDate()+'</span>';b.onclick=()=>{selected=d;reload();};bar.appendChild(b);}
  const next=document.createElement("button");next.className="arrow";next.textContent="\u203A";next.onclick=()=>{selected=addDays(selected,1);reload();};bar.appendChild(next);}
function renderTabs(){const liveCount=current.filter(m=>m.status==="live").length;const el=document.getElementById("tabs");el.innerHTML="";
  [["all","All matches"],["live","Live "+(liveCount?'<span class="lv">('+liveCount+')</span>':"")]].forEach(p=>{
    const b=document.createElement("button");b.className="tab"+(tabMode===p[0]?" active":"");b.innerHTML=p[1];b.onclick=()=>{tabMode=p[0];render();};el.appendChild(b);});}
function renderBubbles(){const s=dayStats(filteredMatches());
  document.getElementById("bubbles").innerHTML='<div class="bubble"><div class="num">'+s.p+'</div><div class="lab">Settled</div></div>'+

function matchCardHTML(m){const sc=m.score||{},fin=m.status==="finished",live=m.status==="live";let st;

  else if(fin)st='<span class="sched">Final</span>';else st='<span class="sched">'+timeStr(m)+'</span>';
  const p=m.prediction||{},pa=p.prob_a==null?0.5:p.prob_a,pb=1-pa;
  const favN=lastName(pa>=0.5?m.player_a:m.player_b),dogN=lastName(pa>=0.5?m.player_b:m.player_a),favP=Math.round(Math.max(pa,pb)*100);
  const pickA=m.predicted_winner==="a",pickB=m.predicted_winner==="b",servA=live&&sc.server==="a",servB=live&&sc.server==="b",wonA=fin&&sc.winner==="a",wonB=fin&&sc.winner==="b";
  const lc=(p.confidence==="low")?'<span class="lowconf">low-confidence</span>':"";const rnd=m.round?" \u00b7 "+m.round:"";
  function nm(nme,pk,sv,wn){return '<span class="pname'+(sv?' serving':'')+(wn?' winner':'')+'">'+nme+(pk?'<span class="pick">PICK</span>':'')+'</span>';}
  return '<div class="card-top"><span class="tier '+m.tier+'">'+m.tier+'</span><span class="tourn">'+m.tournament+rnd+'</span>'+lc+'<span class="status">'+st+'</span></div>'+
    '<div class="row">'+nm(m.player_a,pickA,servA,wonA)+'<span class="sets">'+(sc.sets_a||[]).join(" ")+'</span><span class="game">'+(live?sc.game_a:"")+'</span></div>'+
    '<div class="row">'+nm(m.player_b,pickB,servB,wonB)+'<span class="sets">'+(sc.sets_b||[]).join(" ")+'</span><span class="game">'+(live?sc.game_b:"")+'</span></div>'+
    '<div class="pred"><div class="bar a" style="width:'+(pa>=0.5?pa:pb)*100+'%">'+favN+' '+favP+'%</div><div class="bar b" style="width:'+(pa>=0.5?pb:pa)*100+'%">'+(100-favP)+'% '+dogN+'</div></div>';}

function formPills(arr){if(!arr||!arr.length)return "";return '<span class="form-pills">'+arr.slice(0,5).map(r=>{const w=r[0]==="W";return '<span class="fp '+(w?'w':'l')+'" title="'+r+'">'+r[0]+'</span>';}).join("")+'</span>';}
function statRow(lab,a,b,aPct,bPct,na){if(na)return '<div class="stat"><div class="stat-top"><span class="v dim">\u2014</span><span class="lab">'+lab+'</span><span class="v dim">\u2014</span></div><div class="stat-na">not in current data feed</div></div>';

function renderDetail(m){const sc=m.score||{},live=m.status==="live",fin=m.status==="finished";

function statsHTML(m){const s=m.stats;

  const a=s.a,b=s.b;function pctTxt(won,tot,pct){return pct==null?"\u2014":pct+"% ("+won+"/"+tot+")";}
  let h='<div class="stat-sec">Service</div>';
  h+=statRow("Service Points Won",pctTxt(a.service_points_won,a.service_points_total,a.service_points_pct),pctTxt(b.service_points_won,b.service_points_total,b.service_points_pct),a.service_points_pct,b.service_points_pct);
  h+=statRow("Break Points Saved",a.break_points_saved+"/"+a.break_points_faced,b.break_points_saved+"/"+b.break_points_faced,a.break_points_faced?a.break_points_saved/a.break_points_faced*100:0,b.break_points_faced?b.break_points_saved/b.break_points_faced*100:0);
  h+='<div class="stat-sec">Return</div>';
  h+=statRow("Return Points Won",pctTxt(a.return_points_won,a.return_points_total,a.return_points_pct),pctTxt(b.return_points_won,b.return_points_total,b.return_points_pct),a.return_points_pct,b.return_points_pct);
  h+=statRow("Break Points Won",a.break_points_won+"/"+a.break_points_chances,b.break_points_won+"/"+b.break_points_chances,a.break_points_chances?a.break_points_won/a.break_points_chances*100:0,b.break_points_chances?b.break_points_won/b.break_points_chances*100:0);
  h+='<div class="stat-sec">Games &amp; Points</div>';
  h+=statRow("Service Games Won",a.service_games_won+"/"+a.service_games_total,b.service_games_won+"/"+b.service_games_total,a.service_games_pct,b.service_games_pct);
  h+=statRow("Total Games Won",a.games_won,b.games_won,a.games_won,b.games_won);
  h+=statRow("Total Points Won",a.total_points_won,b.total_points_won,a.total_points_won,b.total_points_won);
  return h;}

function connectWS(){const proto=location.protocol==="https:"?"wss":"ws";const ws=new WebSocket(proto+"://"+location.host+"/ws/live");
  ws.onclose=()=>setTimeout(connectWS,1500);
  ws.onmessage=ev=>{const msg=JSON.parse(ev.data);if(msg.type!=="score")return;const m=byId[msg.match_id];if(!m)return;
    m.score=msg.score;m.status=msg.score.status;
    if(msg.score.status==="finished"&&m.predicted_winner&&(msg.score.winner==="a"||msg.score.winner==="b"))m.correct=(m.predicted_winner===msg.score.winner);
    if(!detailId)render();};}

  const sH=g.home.starter||{},sA=g.away.starter||{};
  let statTxt=live?'<span class="live-tag"><span class="pulse"></span>Live</span>':fin?"Final":(g.event_time||"");
  const head='<div class="d-head"><div class="d-meta"><span class="tier" style="background:#3b6fb0">MLB</span><span class="tourn">'+(g.venue||"")+'</span><span class="status" style="margin-left:auto">'+statTxt+'</span></div>'+
    '<div class="d-logos"><img src="'+(g.away.logo||"")+'" onerror="this.style.visibility=\'hidden\'">'+
    '<div class="mlb-vs">'+((fin||live)?'<div class="rs">'+g.score.away+" - "+g.score.home+'</div>':"@")+(live?'<div class="inn">'+(g.score.state||"")+" "+(g.score.inning||"")+'</div>':"")+'</div>'+
    '<img src="'+(g.home.logo||"")+'" onerror="this.style.visibility=\'hidden\'"></div>'+
    '<div class="proj-line"><span class="pr">'+g.away.abbr+' <b>'+g.exp_runs_away+'</b></span> projected runs <span class="pr"><b>'+g.exp_runs_home+'</b> '+g.home.abbr+'</span></div>'+
    '<div class="d-pred"><div class="bar a" style="width:'+pa+'%">'+g.away.abbr+" "+pa+'%</div><div class="bar b" style="width:'+ph+'%">'+ph+"% "+g.home.abbr+'</div></div></div>';
  const tabs='<div class="d-tabs"><button class="d-tab '+(mlbDetailTab==="prediction"?"active":"")+'" onclick="setMLBTab(\'prediction\')">Prediction</button>'+
    '<button class="d-tab '+(mlbDetailTab==="matchups"?"active":"")+'" onclick="setMLBTab(\'matchups\')">Matchups</button>'+
    '<button class="d-tab '+(mlbDetailTab==="injuries"?"active":"")+'" onclick="setMLBTab(\'injuries\')">Injuries</button></div>';
  let body;
  if(mlbDetailTab==="matchups"){body=matchupsHTML();}
  else if(mlbDetailTab==="injuries"){body=injuriesHTML();}
  else{const mp=(g.analysis||"").split("\n\n").filter(Boolean).map(p=>'<p style="margin:0 0 12px">'+p+'</p>').join("");
    body='<div class="panel"><div style="font-family:Fraunces,serif;font-size:16px;line-height:1.6;color:#e4d8c2;margin-bottom:18px">'+mp+'</div>'+
    '<div class="stat-sec">Why \u2014 the factors</div>'+
    '<div class="fac"><span class="va">'+g.away.abbr+'</span><span class="lab"></span><span class="vb">'+g.home.abbr+'</span></div>'+
    facRow("Projected runs",g.exp_runs_away,g.exp_runs_home)+
    facRow("Offense (x lg avg)",(f.away_offense_x!=null?f.away_offense_x:"\u2014"),(f.home_offense_x!=null?f.home_offense_x:"\u2014"))+
    facRow("Staff runs allowed (x)",(f.away_staff_x!=null?f.away_staff_x:"\u2014"),(f.home_staff_x!=null?f.home_staff_x:"\u2014"))+
    facRow("Starter ERA",(sA.era!=null?sA.era.toFixed(2):"\u2014"),(sH.era!=null?sH.era.toFixed(2):"\u2014"))+
    facRow("Bullpen ERA",(g.away.bullpen_era!=null?g.away.bullpen_era.toFixed(2):"\u2014"),(g.home.bullpen_era!=null?g.home.bullpen_era.toFixed(2):"\u2014"))+
    facRow("Runs / game",(g.away.runs_per_game!=null?g.away.runs_per_game:"\u2014"),(g.home.runs_per_game!=null?g.home.runs_per_game:"\u2014"))+
    '<div class="fac" style="border:none"><span class="va"></span><span class="lab">Park '+(g.park_factor||1).toFixed(2)+(g.weather?" \u00b7 "+g.weather:"")+'</span><span class="vb"></span></div>'+
    '<div class="note">Starter is each team\u2019s announced probable; bullpen is the team staff ERA. Park &amp; weather scale the run environment for both sides. Not betting advice.</div></div>';}
  document.getElementById("detail").innerHTML='<button class="back" onclick="closeDetail()">\u2039 Back to games</button>'+head+tabs+body;}

document.getElementById("home-link").onclick=closeDetail;
window.addEventListener("hashchange",()=>{if(!location.hash&&detailId)closeDetail();});
(async function(){await reload();connectWS();loadAccuracy();
  if(location.hash.indexOf("#m")===0)openDetail(parseInt(location.hash.slice(2)));
  else if(location.hash.indexOf("#g")===0){setSport("mlb");openMLBDetail(parseInt(location.hash.slice(2)));}
})();
setInterval(()=>{if(!detailId&&ymd(selected)===ymd(startOfDay(new Date())))reload();},30000);
setInterval(loadAccuracy,300000);  // refresh 30-day badge every 5 min, independent of date
</script>
</body>
</html>
