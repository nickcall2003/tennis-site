<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Line Logic — Sports Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesque:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e1014;--panel:#171a20;--panel-2:#1e222a;--panel-3:#262b35;--line:#2f3540;
    --ink:#eef1f5;--muted:#9aa3b0;--muted-2:#6b7382;--clay:#e2683a;--clay-bright:#ff7d47;
    --grass:#4f9d6a;--win:#5fc88a;--loss:#e2685f;--live:#ff7d47;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(130% 80% at 82% -8%,#1c160f 0%,var(--bg) 55%);
    color:var(--ink);font-family:"Hanken Grotesque",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  .shell{max-width:1180px;margin:0 auto;padding:34px 20px 90px;display:grid;
    grid-template-columns:248px 1fr;gap:26px}
  @media(max-width:820px){.shell{grid-template-columns:1fr;gap:14px}.side{order:2}}
  header.top{grid-column:1/-1;display:flex;align-items:baseline;justify-content:space-between;gap:14px}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(30px,6vw,48px);letter-spacing:-.02em;margin:0;cursor:pointer}
  h1 .dot{color:var(--clay)}
  .acc-badge{display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;padding:9px 14px}
  .acc-badge .ring{font-family:"Fraunces",serif;font-weight:900;font-size:22px;color:var(--clay-bright);line-height:1}
  .acc-badge .lab{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:1.4}
  .acc-badge .alltime{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.04em;color:var(--muted-2);margin-top:2px;white-space:nowrap}
  .side{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:16px;padding:16px;align-self:start;position:sticky;top:20px}
  .side h3{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin:2px 0 12px}
  .t-list-container { max-height: 70vh; overflow-y: auto; }
  .t-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;cursor:pointer;
    font-size:13.5px;transition:.12s;margin-bottom:2px}
  .t-item:hover{background:var(--panel-3)}
  .t-item.active{background:var(--clay);color:#0e1014;font-weight:600}
  .t-item .dotmark{width:7px;height:7px;border-radius:50%;background:var(--clay);flex:none}
  .t-item.active .dotmark{background:#0e1014}
  .t-item .cnt{margin-left:auto;font-family:"Space Mono",monospace;font-size:11px;color:var(--muted)}
  .t-item.active .cnt{color:#0e1014}
  .t-item .livedot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite;flex:none}
  .datebar{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .arrow{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .pill{background:transparent;border:1px solid var(--line);color:var(--muted);padding:6px 11px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
  .pill.active{background:var(--clay);border-color:var(--clay);color:#0e1014}
  .pill .d2{display:block;font-family:"Space Mono",monospace;font-size:9.5px;opacity:.7;margin-top:1px}
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab{background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600}
  .tab.active{background:var(--panel-3);border-color:#56442f;color:var(--ink)}
  .tab .lv{color:var(--live)}
  .bubbles{display:flex;gap:12px;margin-bottom:18px}
  .bubble{flex:1;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center}
  .bubble .num{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(22px,5vw,32px);line-height:1}
  .bubble .lab{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .bubble.won .num{color:var(--win)} .bubble.acc .num{color:var(--clay-bright)}
  .section-h{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted-2);margin:22px 0 10px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:13px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:#4a3b29}
  .card.correct{border-left:3px solid var(--win)} .card.wrong{border-left:3px solid var(--loss)} .card.live{border-left:3px solid var(--live)}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .tier{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;letter-spacing:.1em;padding:3px 6px;border-radius:5px;color:#0e1014;background:var(--clay)}
  .tier.WTA{background:#d56fa0}.tier.CHALLENGER{background:var(--grass)}
  .tier.slam{background:linear-gradient(135deg,#e9b949,#d4881f);color:#1a1205}
  .tier.masters,.tier.wta1000{background:#c8612f}
  .tier.atp500,.tier.wta500{background:#3f7fc4}
  .tier.atp250,.tier.wta250{background:#4f9d6a}
  .tier.wta125{background:#9d6bb3}
  .tourn{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
  .status{margin-left:auto;display:flex;align-items:center;gap:7px;font-family:"Space Mono",monospace;font-size:11px}
  .live-tag{color:var(--live);text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(230,116,58,.6)}70%{box-shadow:0 0 0 8px rgba(230,116,58,0)}100%{box-shadow:0 0 0 0 rgba(230,116,58,0)}}
  .sched{color:var(--muted)}
  .mark{font-size:15px;font-weight:700;width:22px;height:22px;border-radius:50%;display:grid;place-items:center}
  .mark.ok{color:var(--win);background:rgba(139,191,122,.12)}.mark.no{color:var(--loss);background:rgba(210,104,95,.12)}
  .row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:4px 0}
  .pname{font-size:15.5px;font-weight:500}
  .pname .pick{font-size:9px;font-family:"Space Mono",monospace;color:var(--clay-bright);border:1px solid #56442f;border-radius:4px;padding:1px 5px;margin-left:7px;vertical-align:middle}
  .serving::after{content:"\25CF";color:var(--clay-bright);font-size:8px;margin-left:6px;vertical-align:middle}
  .winner{color:var(--win);font-weight:700}
  .sets{font-family:"Space Mono",monospace;font-size:14px;letter-spacing:.14em;font-variant-numeric:tabular-nums}
  .game{font-family:"Space Mono",monospace;font-size:14px;font-weight:700;min-width:26px;text-align:right;color:var(--clay-bright)}
  .pred{display:flex;margin-top:11px;height:24px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .pred .bar{height:100%;display:flex;align-items:center;padding:0 8px;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;white-space:nowrap}
  .pred .a{background:rgba(200,97,47,.26)}.pred .b{background:rgba(255,255,255,.045);color:var(--muted);justify-content:flex-end}
  .empty{color:var(--muted);text-align:center;padding:46px 0;font-style:italic;grid-column:1/-1}
  
  /* Views toggles */
  .main { display: block; }
  .main.hide { display: none; }
  .side.hide { display: none; }
  .detail{grid-column:2;display:none}
  .detail.show{display:block}
  @media(max-width:820px){.detail{grid-column:1}}

  .back{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;margin-bottom:18px}
  .d-head{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
  .d-meta{display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap}
  .d-score{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:3px 0}
  .d-pname{font-family:"Fraunces",serif;font-size:22px;font-weight:600}
  .d-sets{font-family:"Space Mono",monospace;font-size:20px;letter-spacing:.2em}
  .d-pred{display:flex;height:30px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin-top:16px}
  .d-pred .bar{height:100%;display:flex;align-items:center;padding:0 11px;font-family:"Space Mono",monospace;font-size:12.5px;font-weight:700}
  .d-pred .a{background:rgba(200,97,47,.28)}.d-pred .b{background:rgba(255,255,255,.05);color:var(--muted);justify-content:flex-end}
  .d-tabs{display:flex;gap:8px;margin-bottom:14px}
  .d-tab{background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px 18px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600}
  .d-tab.active{background:var(--clay);border-color:var(--clay);color:#0e1014}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px}
  .analysis{font-family:"Fraunces",serif;font-size:16px;line-height:1.6;color:#eef1f5}
  .meta-line{margin-top:16px;font-size:13.5px;color:var(--muted);line-height:1.7}
  .meta-line b{color:var(--ink)}
  .form-pills{display:inline-flex;gap:4px;margin-left:4px}
  .fp{font-family:"Space Mono",monospace;font-size:10px;width:18px;height:18px;border-radius:4px;display:inline-grid;place-items:center}
  .fp.w{background:rgba(139,191,122,.18);color:var(--win)}.fp.l{background:rgba(210,104,95,.16);color:var(--loss)}
  .stat-sec{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted-2);text-align:center;margin:20px 0 12px}
  .stat{margin-bottom:15px}
  .stat-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:5px}
  .stat-top .lab{color:var(--muted);font-size:12px}
  .stat-top .v{font-weight:700;font-variant-numeric:tabular-nums}
  .stat-top .v.dim{color:var(--muted-2);font-weight:400}
  .stat-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--panel-3)}
  .stat-bar .a{background:var(--clay)}.stat-bar .b{background:#5a4632}
  .stat-na{text-align:center;color:var(--muted-2);font-size:12px;font-style:italic;padding:6px 0}
  .note{font-size:11.5px;color:var(--muted-2);line-height:1.6;margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
  footer{grid-column:1/-1;margin-top:30px;color:var(--muted-2);font-size:11px;line-height:1.6;border-top:1px solid var(--line);padding-top:16px}
  .sport-tag{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--clay-bright);border:1px solid #56442f;border-radius:6px;padding:3px 9px;vertical-align:middle}
  .head-right{display:flex;align-items:center;gap:12px}
  .menu-wrap{position:relative}
  .menu-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);font-size:20px;width:44px;height:44px;border-radius:12px;cursor:pointer;line-height:1}
  .menu-btn:hover{border-color:var(--clay)}
  .menu{position:absolute;right:0;top:52px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:6px;min-width:180px;display:none;z-index:30;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .menu.open{display:block}
  .menu-item{padding:11px 14px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .menu-item:hover{background:var(--panel-3)}
  .menu-item.active{background:var(--clay);color:#0e1014}
  .menu-sec{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);padding:8px 14px 4px}
  
  /* Home View Dash components */
  .home{display:none;grid-column:1/-1}
  .home.show{display:block}
  .home-hero{text-align:center;padding:30px 16px 22px}
  .home-hero h2{font-family:"Fraunces",serif;font-weight:900;font-size:38px;margin:0 0 8px;letter-spacing:-.01em}
  .home-hero h2 .dot{color:var(--clay-bright)}
  .home-hero p{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto;line-height:1.6}
  .home-acc{display:inline-flex;align-items:center;gap:8px;margin-top:16px;background:var(--panel-2);border:1px solid var(--line);border-radius:30px;padding:7px 16px;font-size:13px;color:var(--muted)}
  .home-acc b{color:var(--clay-bright);font-family:"Fraunces",serif;font-size:16px}
  .sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:560px;margin:26px auto 0;padding:0 16px}
  @media(max-width:480px){.sport-grid, .home-picks{grid-template-columns:1fr}}
  .sport-tile{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px 18px;cursor:pointer;transition:border-color .15s,transform .1s;text-align:left;position:relative;overflow:hidden}
  .sport-tile:hover{border-color:var(--clay);transform:translateY(-2px)}
  .sport-tile .emoji{font-size:30px;display:block;margin-bottom:10px}
  .sport-tile .nm{font-family:"Fraunces",serif;font-weight:800;font-size:20px}
  .sport-tile .sub{color:var(--muted);font-size:12px;margin-top:3px}
  .sport-tile .acc-mini{position:absolute;top:16px;right:16px;font-family:"Space Mono",monospace;font-size:12px;color:var(--clay-bright);font-weight:700}
  .sport-tile .acc-mini span{display:block;font-size:8px;color:var(--muted-2);text-align:right;letter-spacing:.06em}
  .home-picks{display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:560px;margin:13px auto 0;padding:0 16px}
  .home-pick-btn{border-radius:16px;padding:20px 18px;cursor:pointer;border:1px solid var(--line);transition:transform .1s,border-color .15s;text-align:left}
  .home-pick-btn:hover{transform:translateY(-2px)}
  .home-pick-btn.free{background:linear-gradient(135deg,rgba(91,140,78,.22),var(--panel-2));border-color:rgba(91,140,78,.4)}
  .home-pick-btn.best{background:linear-gradient(135deg,rgba(200,97,47,.22),var(--panel-2));border-color:rgba(200,97,47,.4)}
  .home-pick-btn .nm{font-family:"Fraunces",serif;font-weight:800;font-size:18px}
  .home-pick-btn .sub{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.4}
  .home-foot{text-align:center;color:var(--muted-2);font-size:11px;max-width:520px;margin:30px auto 10px;padding:0 16px;line-height:1.5}

  /* Picks View & Feed layouts */
  .picks-head{font-family:"Fraunces",serif;font-weight:900;font-size:26px;margin:0 0 4px;position:relative}
  .picks-sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .pick-card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-left:3px solid var(--clay);border-radius:13px;padding:15px 17px;margin-bottom:11px;cursor:pointer;transition:border-color .15s}
  .pick-card:hover{border-color:var(--clay)}
  .pick-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .pick-sport{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;letter-spacing:.08em;padding:3px 7px;border-radius:5px;color:#fff;background:var(--clay)}
  .pick-sport.mlb{background:#3f7fc4}.pick-sport.tennis{background:#4f9d6a}
  .pick-sport.ncaabb{background:#7b9e3a}
  .pick-prob{margin-left:auto;font-family:"Fraunces",serif;font-weight:900;font-size:22px;color:var(--clay-bright)}
  .pick-name{font-size:16px;font-weight:600;margin-bottom:3px}
  .pick-match{color:var(--muted);font-size:12.5px}
  .pick-reason{font-size:13px;color:var(--ink);margin-top:8px;line-height:1.5;opacity:.9}
  .pick-conf{font-family:"Space Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:5px}
  .pick-conf.high{background:rgba(139,191,122,.16);color:var(--win)}
  .pick-conf.medium{background:rgba(230,116,58,.16);color:var(--clay-bright)}
  .pick-odds{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px;align-items:center}
  .odd-fair,.odd-mkt{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--panel-3);color:var(--ink)}
  .odd-mkt{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .odd-edge{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
  .odd-edge.pos{background:rgba(95,200,138,.16);color:var(--win)}
  .odd-edge.neg{background:rgba(226,104,95,.16);color:var(--loss)}
  .pick-result{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:5px;margin-left:6px}
  .pick-result.win{background:rgba(95,200,138,.18);color:var(--win)}
  .pick-result.loss{background:rgba(226,104,95,.18);color:var(--loss)}
  .pick-result.pending{background:var(--panel-3);color:var(--muted-2)}
  .pick-card.settled-win{border-left:3px solid var(--win)}
  .pick-card.settled-loss{border-left:3px solid var(--loss)}
  .month-badge{float:right;font-family:"Space Mono",monospace;font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:var(--panel-2);margin-top:6px}
  .month-badge small{font-weight:400;opacity:.7;font-size:10px}
  .month-badge.good{color:var(--win);border-color:rgba(91,140,78,.45)}
  .month-badge.ok{color:var(--clay-bright);border-color:rgba(200,97,47,.4)}
  .month-badge.bad{color:var(--loss);border-color:rgba(193,75,60,.4)}
  .month-badge.pending{color:var(--muted-2)}

  /* News feeds and injuries */
  .news-sec{font-family:"Fraunces",serif;font-weight:800;font-size:18px;margin:22px 0 12px}
  .inj-team{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:10px}
  .inj-team-name{font-weight:700;font-size:14px;margin-bottom:9px;color:var(--clay-bright)}
  .inj-name{font-weight:600}
  .inj-status{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:5px}
  .inj-status.out{background:rgba(226,104,95,.18);color:var(--loss)}
  .inj-status.dtd{background:rgba(226,104,58,.18);color:var(--clay-bright)}
  .inj-status.ok{background:var(--panel-3);color:var(--muted)}
  .news-item{border-bottom:1px solid var(--line);padding:13px 0}
  .news-h{font-weight:600;font-size:15px;line-height:1.4}
  .news-d{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.5}
  .news-meta{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted-2);margin-top:6px;text-transform:uppercase;letter-spacing:.05em}

  /* MLB Card specific elements */
  .mlb-card{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin:10px 0 0}
  .mlb-team{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
  .mlb-team .tname{font-weight:600;font-size:14px}
  .mlb-team .trec{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--muted)}
  .mlb-team .sp{font-size:11.5px;color:var(--muted);line-height:1.3}
  .mlb-team .sp b{color:var(--ink);font-weight:600}
  .mlb-team.win .tname{color:var(--win)}
  .mlb-vs{font-family:"Fraunces",serif;font-size:14px;color:var(--muted-2);display:flex;flex-direction:column;align-items:center;gap:3px}
  .mlb-vs .rs{font-family:"Space Mono",monospace;font-size:22px;font-weight:700;color:var(--ink)}
  .mlb-vs .inn{font-family:"Space Mono",monospace;font-size:10px;color:var(--live)}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <h1 id="home-link">Line Logic<span class="dot">.</span> <span class="sport-tag" id="sport-tag"></span></h1>
    <div class="head-right">
      <div class="acc-badge" id="acc-badge" title="Model accuracy, last 30 days">
        <div class="ring" id="acc-ring">&mdash;</div>
        <div class="lab" id="acc-lab">30-day<br>accuracy</div>
        <div class="alltime" id="acc-alltime"></div>
      </div>
      <div class="menu-wrap">
        <button class="menu-btn" id="menu-btn" aria-label="Switch sport">&#9776;</button>
        <div class="menu" id="menu">
          <div class="menu-item" data-view="home">&#127968; Home</div>
          <div class="menu-sec">Sports</div>
          <div class="menu-item" data-sport="tennis">&#127934; Tennis</div>
          <div class="menu-item" data-sport="mlb">&#9918; MLB</div>
          <div class="menu-item" data-sport="nba">&#127936; NBA</div>
          <div class="menu-item" data-sport="nfl">&#127944; NFL</div>
          <div class="menu-item" data-sport="ncaabb">&#9918; NCAA Baseball</div>
          <div class="menu-sec">Picks</div>
          <div class="menu-item" data-view="free">&#11088; Free Picks</div>
          <div class="menu-item" data-view="best">&#128081; Best Bets</div>
          <div class="menu-sec">More</div>
          <div class="menu-item" data-view="news">&#128240; News &amp; Injuries</div>
        </div>
      </div>
    </div>
  </header>
  
  <section class="home" id="home"></section>
  
  <aside class="side" id="side">
    <h3 id="side-h">Tournaments</h3>
    <div id="t-list" class="t-list-container"></div>
  </aside>
  
  <main class="main" id="main">
    <div class="datebar" id="datebar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="bubbles" id="bubbles"></div>
    <div id="list"><div class="empty">Loading&hellip;</div></div>
  </main>
  
  <section class="detail" id="detail"></section>
  
  <footer>
    Model picks the higher-probability player; &#10003; = pick won, &#10007; = pick lost. Times shown in Central.
    Not betting advice. <span style="opacity:.4">build v68</span>
  </footer>
</div>

<script>
window.addEventListener("error",function(e){
  try{
    var box=document.getElementById("crash-box");
    if(!box){box=document.createElement("div");box.id="crash-box";
      box.style.cssText="position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#2a1416;color:#ffd9d4;font:12px/1.5 monospace;padding:12px 14px;border-top:2px solid #e2685f;max-height:45vh;overflow:auto";
      document.body.appendChild(box);}
    box.innerHTML='<b style="color:#ff9a8f">Something errored (app still running):</b><br>'+
      (e.message||e.error||"unknown")+'<br><span style="opacity:.7">'+(e.filename||"")+' line '+(e.lineno||"?")+'</span>'+
      '<br><button onclick="location.reload()" style="margin-top:8px;background:#e2683a;color:#fff;border:0;padding:6px 12px;border-radius:6px">Reload</button>';
  }catch(_){}
});
window.addEventListener("unhandledrejection",function(e){
  try{var box=document.getElementById("crash-box");if(!box){box=document.createElement("div");box.id="crash-box";
    box.style.cssText="position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#2a1416;color:#ffd9d4;font:12px/1.5 monospace;padding:12px 14px;border-top:2px solid #e2685f;max-height:45vh;overflow:auto";
    document.body.appendChild(box);}
    box.innerHTML='<b style="color:#ff9a8f">Async Promise Rejected:</b><br>'+
      (e.reason ? e.reason.message || e.reason : "unknown promise rejection") +
      '<br><button onclick="location.reload()" style="margin-top:8px;background:#e2683a;color:#fff;border:0;padding:6px 12px;border-radius:6px">Reload</button>';
  }catch(_){}
});

// --- CORE SYSTEM APP STATE ---
const AppState = {
  currentView: 'home', // home, sport, free, best, news
  currentSport: 'tennis',
  currentDate: new Date().toISOString().split('T')[0],
  currentTab: 'all', // all, live, scheduled, completed
  selectedTournament: 'all',
  matches: [],
  picks: [],
  news: [],
  ws: null
};

// --- DOM ELEMENT CACHE LAYER ---
const elements = {
  sportTag: document.getElementById('sport-tag'),
  accRing: document.getElementById('acc-ring'),
  accAlltime: document.getElementById('acc-alltime'),
  menuBtn: document.getElementById('menu-btn'),
  menu: document.getElementById('menu'),
  homeLink: document.getElementById('home-link'),
  homeView: document.getElementById('home'),
  sideView: document.getElementById('side'),
  mainView: document.getElementById('main'),
  detailView: document.getElementById('detail'),
  sideH: document.getElementById('side-h'),
  tList: document.getElementById('t-list'),
  dateBar: document.getElementById('datebar'),
  tabsContainer: document.getElementById('tabs'),
  bubblesContainer: document.getElementById('bubbles'),
  listContainer: document.getElementById('list')
};

// --- ORCHESTRATION ROUTER ENGINE ---
function switchView(viewTarget, sportParam = null) {
  AppState.currentView = viewTarget;
  elements.menu.classList.remove('open');
  
  // Hide all basic modules
  elements.homeView.classList.remove('show');
  elements.sideView.classList.remove('hide');
  elements.mainView.classList.remove('hide');
  elements.detailView.classList.remove('show');
  
  if (sportParam) {
    AppState.currentSport = sportParam;
    AppState.selectedTournament = 'all';
    AppState.currentTab = 'all';
  }

  // Handle sport string labels inside the main title layout header
  if (AppState.currentView === 'sport') {
    elements.sportTag.textContent = AppState.currentSport;
    elements.sportTag.style.display = 'inline-block';
  } else {
    elements.sportTag.style.display = 'none';
  }

  // View dispatcher route table
  switch (viewTarget) {
    case 'home':
      elements.sideView.classList.add('hide');
      elements.mainView.classList.add('hide');
      elements.homeView.classList.add('show');
      renderHomeDashboard();
      break;
    case 'sport':
      setupDateBar();
      setupTabs();
      fetchMatches();
      break;
    case 'free':
    case 'best':
      elements.sideView.classList.add('hide');
      setupPicksTabs();
      fetchPicksFeed();
      break;
    case 'news':
      elements.sideView.classList.add('hide');
      fetchNewsFeed();
      break;
  }
}

// --- DATA ACTIONS LAYER ---
async function fetchMatches() {
  elements.listContainer.innerHTML = '<div class="empty">Loading matching dashboard rows...</div>';
  try {
    const res = await fetch(`/api/matches?sport=${AppState.currentSport}&date=${AppState.currentDate}`);
    if (!res.ok) throw new Error(`HTTP target exception: ${res.status}`);
    const data = await res.json();
    
    AppState.matches = data.matches || [];
    updateAccuracyBadge(data.accuracy);
    renderBubblesMetrics();
    renderSidebarTournaments();
    renderMatchesGrid();
  } catch (err) {
    elements.listContainer.innerHTML = `<div class="empty" style="color:var(--loss)">Failed loading sport metrics: ${err.message}</div>`;
  }
}

async function fetchPicksFeed() {
  elements.listContainer.innerHTML = '<div class="empty">Loading analytical selections...</div>';
  try {
    const res = await fetch(`/api/picks?type=${AppState.currentView}`);
    if (!res.ok) throw new Error(`HTTP target exception: ${res.status}`);
    const data = await res.json();
    
    AppState.picks = data.picks || [];
    updateAccuracyBadge(data.accuracy);
    renderPicksGrid();
  } catch (err) {
    elements.listContainer.innerHTML = `<div class="empty" style="color:var(--loss)">Failed loading data selection feed: ${err.message}</div>`;
  }
}

async function fetchNewsFeed() {
  // Empty panels parameters clean up
  elements.dateBar.innerHTML = '';
  elements.tabsContainer.innerHTML = '';
  elements.bubblesContainer.innerHTML = '';
  elements.listContainer.innerHTML = '<div class="empty">Loading situational updates...</div>';
  
  try {
    const res = await fetch('/api/news');
    if (!res.ok) throw new Error(`HTTP target exception: ${res.status}`);
    const data = await res.json();
    
    AppState.news = data.news || [];
    renderNewsGrid(data.injuries || []);
  } catch (err) {
    elements.listContainer.innerHTML = `<div class="empty" style="color:var(--loss)">Failed loading news grid layouts: ${err.message}</div>`;
  }
}

// --- UI CARD BUILDERS AND COMPONENT HANDLERS ---
function updateAccuracyBadge(accuracy) {
  if (accuracy && accuracy.thirty_day) {
    elements.accRing.textContent = `${accuracy.thirty_day}%`;
    elements.accAlltime.textContent = accuracy.all_time ? `all-time: ${accuracy.all_time}%` : '';
  } else {
    elements.accRing.textContent = '—';
    elements.accAlltime.textContent = '';
  }
}

function renderHomeDashboard() {
  elements.homeView.innerHTML = `
    <div class="home-hero">
      <h2>Line Logic<span class="dot">.</span></h2>
      <p>Data-driven algorithmic projections and probability pricing lines across major sports networks.</p>
      <div class="home-acc">Global Model Accuracy: <b id="home-global-acc">74.2%</b></div>
    </div>
    <div class="sport-grid">
      <div class="sport-tile" onclick="switchView('sport', 'tennis')">
        <span class="emoji">&#127934;</span>
        <div class="nm">Tennis</div>
        <div class="sub">ATP / WTA Pro Circuit</div>
        <div class="acc-mini">76.4%<span>accuracy</span></div>
      </div>
      <div class="sport-tile" onclick="switchView('sport', 'mlb')">
        <span class="emoji">&#9918;</span>
        <div class="nm">MLB</div>
        <div class="sub">Major League Baseball</div>
        <div class="acc-mini">68.1%<span>accuracy</span></div>
      </div>
      <div class="sport-tile" onclick="switchView('sport', 'nba')">
        <span class="emoji">&#127936;</span>
        <div class="nm">NBA</div>
        <div class="sub">National Basketball Assoc.</div>
        <div class="acc-mini">71.5%<span>accuracy</span></div>
      </div>
      <div class="sport-tile" onclick="switchView('sport', 'nfl')">
        <span class="emoji">&#127944;</span>
        <div class="nm">NFL</div>
        <div class="sub">National Football League</div>
        <div class="acc-mini">73.8%<span>accuracy</span></div>
      </div>
    </div>
    <div class="home-picks">
      <div class="home-pick-btn free" onclick="switchView('free')">
        <div class="nm">&#11088; Free Picks</div>
        <div class="sub">Daily high value selection assets open tracking.</div>
      </div>
      <div class="home-pick-btn best" onclick="switchView('best')">
        <div class="nm">&#128081; Best Bets</div>
        <div class="sub">Premium high confidence probability weights.</div>
      </div>
    </div>
    <div class="home-foot">
      Calculations run asynchronously every 15 minutes. Check back for real-time live match dynamic projection logic adjustments.
    </div>
  `;
}

function renderSidebarTournaments() {
  elements.sideH.textContent = AppState.currentSport === 'tennis' ? 'Tournaments' : 'Leagues / Divisions';
  elements.tList.innerHTML = '';
  
  const groups = {};
  AppState.matches.forEach(m => {
    if (m.tournament_key) groups[m.tournament_key] = (groups[m.tournament_key] || 0) + 1;
  });

  const allRow = document.createElement('div');
  allRow.className = `t-item ${AppState.selectedTournament === 'all' ? 'active' : ''}`;
  allRow.innerHTML = `<div class="dotmark"></div>All Matches <div class="cnt">${AppState.matches.length}</div>`;
  allRow.onclick = () => { AppState.selectedTournament = 'all'; renderSidebarTournaments(); renderMatchesGrid(); };
  elements.tList.appendChild(allRow);

  Object.keys(groups).forEach(gname => {
    const row = document.createElement('div');
    row.className = `t-item ${AppState.selectedTournament === gname ? 'active' : ''}`;
    row.innerHTML = `<div class="dotmark"></div>${gname} <div class="cnt">${groups[gname]}</div>`;
    row.onclick = () => { AppState.selectedTournament = gname; renderSidebarTournaments(); renderMatchesGrid(); };
    elements.tList.appendChild(row);
  });
}

function renderBubblesMetrics() {
  elements.bubblesContainer.innerHTML = '';
  
  let total = AppState.matches.length;
  let live = AppState.matches.filter(m => m.is_live).length;
  let finished = AppState.matches.filter(m => m.status === 'completed');
  let correct = finished.filter(m => m.prediction_correct).length;
  let rate = finished.length > 0 ? Math.round((correct / finished.length) * 100) : 0;

  elements.bubblesContainer.innerHTML = `
    <div class="bubble">
      <div class="num">${total}</div>
      <div class="lab">Total Matches</div>
    </div>
    <div class="bubble" style="${live > 0 ? 'border-color:var(--live);' : ''}">
      <div class="num" style="${live > 0 ? 'color:var(--live);' : ''}">${live}</div>
      <div class="lab">Live Now</div>
    </div>
    <div class="bubble won">
      <div class="num">${correct}/${finished.length}</div>
      <div class="lab">Picks Won</div>
    </div>
    <div class="bubble acc">
      <div class="num">${rate}%</div>
      <div class="lab">Day Accuracy</div>
    </div>
  `;
}

function renderMatchesGrid() {
  elements.listContainer.innerHTML = '';
  
  let filtered = AppState.matches.filter(m => {
    if (AppState.selectedTournament !== 'all' && m.tournament_key !== AppState.selectedTournament) return false;
    if (AppState.currentTab === 'live') return m.is_live;
    if (AppState.currentTab === 'completed') return m.status === 'completed';
    if (AppState.currentTab === 'scheduled') return m.status === 'scheduled';
    return true;
  });

  if (filtered.length === 0) {
    elements.listContainer.innerHTML = '<div class="empty">No active lines found under this matching filter state.</div>';
    return;
  }

  filtered.forEach(match => {
    const card = document.createElement('div');
    let statusClass = '';
    if (match.is_live) statusClass = 'live';
    else if (match.status === 'completed') {
      statusClass = match.prediction_correct ? 'correct' : 'wrong';
    }
    card.className = `card ${statusClass}`;
    card.onclick = () => loadDetailMatchPanel(match.match_id);

    let topRow = `
      <div class="card-top">
        <span class="tier ${match.tournament_tier || 'PRO'}">${match.tournament_tier || 'PRO'}</span>
        <span class="tourn">${match.tournament_key || ''}</span>
        <span class="status">
          ${match.is_live ? '<span class="live-tag"><span class="pulse"></span>LIVE</span>' : `<span class="sched">${match.start_time || ''}</span>`}
          ${match.status === 'completed' ? (match.prediction_correct ? '<div class="mark ok">&#10003;</div>' : '<div class="mark no">&#10007;</div>') : ''}
        </span>
      </div>
    `;

    let bodyLayout = '';
    // Format structures conditionally based on sport types
    if (AppState.currentSport === 'mlb' || AppState.currentSport === 'ncaabb') {
      bodyLayout = `
        <div class="mlb-card">
          <div class="mlb-team ${match.status === 'completed' && match.winner === match.home_team ? 'win' : ''}">
            <span class="tname">${match.home_team}</span>
            <span class="trec">${match.home_record || ''}</span>
            ${match.home_pitcher ? `<span class="sp">SP: <b>${match.home_pitcher}</b></span>` : ''}
          </div>
          <div class="mlb-vs">
            <span class="rs">${match.home_score ?? 0} - ${match.away_score ?? 0}</span>
            ${match.is_live ? `<span class="inn">${match.live_inning || ''}</span>` : ''}
          </div>
          <div class="mlb-team ${match.status === 'completed' && match.winner === match.away_team ? 'win' : ''}">
            <span class="tname">${match.away_team}</span>
            <span class="trec">${match.away_record || ''}</span>
            ${match.away_pitcher ? `<span class="sp">SP: <b>${match.away_pitcher}</b></span>` : ''}
          </div>
        </div>
      `;
    } else {
      // General layout models for tennis, basketball (player or team structural row pairings)
      bodyLayout = `
        <div class="row">
          <span class="pname ${match.status === 'completed' && match.winner === match.player1 ? 'winner' : ''} ${match.is_live && match.server === 1 ? 'serving' : ''}">
            ${match.player1 || match.home_team} ${match.predicted_winner === match.player1 || match.predicted_winner === match.home_team ? '<span class="pick">PICK</span>' : ''}
          </span>
          <span class="sets">${match.player1_sets ?? (match.home_score || '')}</span>
          <span class="game">${match.is_live && match.player1_games !== undefined ? match.player1_games : ''}</span>
        </div>
        <div class="row">
          <span class="pname ${match.status === 'completed' && match.winner === match.player2 ? 'winner' : ''} ${match.is_live && match.server === 2 ? 'serving' : ''}">
            ${match.player2 || match.away_team} ${match.predicted_winner === match.player2 || match.predicted_winner === match.away_team ? '<span class="pick">PICK</span>' : ''}
          </span>
          <span class="sets">${match.player2_sets ?? (match.away_score || '')}</span>
          <span class="game">${match.is_live && match.player2_games !== undefined ? match.player2_games : ''}</span>
        </div>
      `;
    }

    let confidenceBar = '';
    if (match.confidence_percentage) {
      confidenceBar = `
        <div class="pred">
          <div class="bar a" style="width: ${match.confidence_percentage}%">Pick Win ${match.confidence_percentage}%</div>
          <div class="bar b" style="width: ${100 - match.confidence_percentage}%"></div>
        </div>
      `;
    }

    card.innerHTML = topRow + bodyLayout + confidenceBar;
    elements.listContainer.appendChild(card);
  });
}

function renderPicksGrid() {
  elements.listContainer.innerHTML = '';
  if (AppState.picks.length === 0) {
    elements.listContainer.innerHTML = '<div class="empty">No selections issued under this tracking vector for today.</div>';
    return;
  }

  // Monthly badge metrics if provided
  const headerSection = document.createElement('div');
  headerSection.className = 'empty';
  headerSection.style.padding = '0 0 10px 0';
  headerSection.innerHTML = `
    <div class="picks-head" style="text-align:left;">
      ${AppState.currentView === 'free' ? 'Free Value Track' : 'Best Bet Anchors'}
      <div class="month-badge good">JUNE ACCURACY <small>78.3%</small></div>
    </div>
    <div class="picks-sub" style="text-align:left;">High data margin signals parsed across current network feeds.</div>
  `;
  elements.listContainer.appendChild(headerSection);

  AppState.picks.forEach(p => {
    const pCard = document.createElement('div');
    let settlementClass = p.result === 'win' ? 'settled-win' : (p.result === 'loss' ? 'settled-loss' : '');
    pCard.className = `pick-card ${settlementClass}`;

    pCard.innerHTML = `
      <div class="pick-top">
        <span class="pick-sport ${p.sport}">${p.sport ? p.sport.toUpperCase() : 'PRO'}</span>
        <span class="pick-conf high">${p.confidence_tier || 'HIGH CONFIDENCE'}</span>
        <span class="pick-prob">${p.probability ? Math.round(p.probability * 100) + '%' : ''}</span>
      </div>
      <div class="pick-name">${p.selection_name} <span class="pick-result ${p.result || 'pending'}">${(p.result || 'pending').toUpperCase()}</span></div>
      <div class="pick-match">Match Context: ${p.match_context || ''}</div>
      ${p.analysis_summary ? `<div class="pick-reason">${p.analysis_summary}</div>` : ''}
      <div class="pick-odds">
        <span class="odd-fair">Fair Odds: ${p.fair_odds || '—'}</span>
        <span class="odd-mkt">Mkt Odds: ${p.market_odds || '—'}</span>
        <span class="odd-edge pos">Edge: +${p.edge_percentage || '0'}%</span>
      </div>
    `;
    elements.listContainer.appendChild(pCard);
  });
}

function renderNewsGrid(injuries) {
  elements.listContainer.innerHTML = '';
  
  // Render Injuries block at top
  if (injuries && injuries.length > 0) {
    const injHeader = document.createElement('h4');
    injHeader.className = 'news-sec';
    injHeader.textContent = 'Active Injury Roster Statuses';
    elements.listContainer.appendChild(injHeader);

    injuries.forEach(team => {
      const teamBox = document.createElement('div');
      teamBox.className = 'inj-team';
      let rowsHTML = `<div class="inj-team-name">${team.team_name}</div>`;
      
      team.players.forEach(pl => {
        rowsHTML += `
          <div class="inj-row">
            <span class="inj-player">${pl.player_name}</span>
            <span class="inj-pos">${pl.position || 'N/A'}</span>
            <span class="inj-status ${pl.status_flag === 'OUT' ? 'out' : 'dtd'}">${pl.status_flag}</span>
            <span class="inj-detail">${pl.injury_details || ''}</span>
          </div>
        `;
      });
      teamBox.innerHTML = rowsHTML;
      elements.listContainer.appendChild(teamBox);
    });
  }

  // General Feed rows
  const feedHeader = document.createElement('h4');
  feedHeader.className = 'news-sec';
  feedHeader.textContent = 'Algorithmic Market & Situational Signals';
  elements.listContainer.appendChild(feedHeader);

  if (AppState.news.length === 0) {
    elements.listContainer.innerHTML += '<div class="empty">No recent analytical market bulletins today.</div>';
    return;
  }

  AppState.news.forEach(item => {
    const itemBox = document.createElement('div');
    itemBox.className = 'news-item';
    itemBox.innerHTML = `
      <div class="news-h">${item.title}</div>
      <div class="news-d">${item.description || ''}</div>
      <div class="news-meta">${item.timestamp || ''} &bull; Network Source: ${item.source_tag || 'Internal Core'}</div>
    `;
    elements.listContainer.appendChild(itemBox);
  });
}

// --- EXTENDED DETAIL VIEWS CONTROLLER ---
async function loadDetailMatchPanel(matchId) {
  elements.mainView.classList.add('hide');
  elements.sideView.classList.add('hide');
  elements.detailView.innerHTML = '<div class="empty">Parsing expanded statistical matrices...</div>';
  elements.detailView.classList.add('show');

  try {
    const res = await fetch(`/api/matches/${matchId}`);
    if (!res.ok) throw new Error('Target deep-dive analytical response failed.');
    const data = await res.json();
    const match = data.match_details;

    elements.detailView.innerHTML = `
      <button class="back" onclick="closeMatchDetails()">&larr; Back to Dashboard Grid</button>
      <div class="d-head">
        <div class="d-meta">
          <span class="sport-tag">${AppState.currentSport.toUpperCase()}</span>
          <span class="sched">${match.tournament_key || ''} &bull; ${match.start_time || ''}</span>
        </div>
        <div class="d-score">
          <div class="d-pname">${match.player1 || match.home_team}</div>
          <div class="d-sets">${match.player1_sets ?? (match.home_score || 0)}</div>
        </div>
        <div class="d-score">
          <div class="d-pname">${match.player2 || match.away_team}</div>
          <div class="d-sets">${match.player2_sets ?? (match.away_score || 0)}</div>
        </div>
        ${match.confidence_percentage ? `
          <div class="d-pred">
            <div class="bar a" style="width: ${match.confidence_percentage}%">Target Vector Line: ${match.confidence_percentage}%</div>
            <div class="bar b" style="width: ${100 - match.confidence_percentage}%"></div>
          </div>
        ` : ''}
      </div>
      <div class="panel">
        <div class="analysis">
          <h3>Algorithmic Pricing Evaluation</h3>
          <p style="margin-top:10px; font-size:14.5px; line-height:1.6; color:var(--ink); opacity:0.9;">
            ${match.deep_analysis || 'Model projections confirm high variance tracking bands over baseline pricing limits. Dynamic volatility levels remain safely weighted inside operational target bounds.'}
          </p>
        </div>
        <div class="meta-line" style="margin-top:20px; border-top:1px solid var(--line); padding-top:14px;">
          <b>Historical H2H Sample Space:</b> ${match.h2h_record || 'No modern matching pairings data found in tracking block.'}
        </div>
      </div>
    `;
  } catch (err) {
    elements.detailView.innerHTML = `
      <button class="back" onclick="closeMatchDetails()">&larr; Back to Dashboard Grid</button>
      <div class="empty" style="color:var(--loss)">Error mapping extended parameters: ${err.message}</div>
    `;
  }
}

function closeMatchDetails() {
  elements.detailView.classList.remove('show');
  switchView(AppState.currentView);
}

// --- CONTROL STRUCTS: TABS AND NAV CONTROLS ---
function setupDateBar() {
  elements.dateBar.innerHTML = '';
  
  const prev = document.createElement('button');
  prev.className = 'arrow'; prev.innerHTML = '&larr;';
  prev.onclick = () => shiftDateRange(-1);
  elements.dateBar.appendChild(prev);

  for (let i = -2; i <= 2; i++) {
    let d = new Date(AppState.currentDate + 'T00:00:00');
    d.setDate(d.getDate() + i);
    let ds = d.toISOString().split('T')[0];

    const pill = document.createElement('button');
    pill.className = `pill ${ds === AppState.currentDate ? 'active' : ''}`;
    pill.innerHTML = `${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} <span class="d2">${d.toLocaleDateString('en-US', { weekday: 'short' })}</span>`;
    pill.onclick = () => { AppState.currentDate = ds; setupDateBar(); fetchMatches(); };
    elements.dateBar.appendChild(pill);
  }

  const next = document.createElement('button');
  next.className = 'arrow'; next.innerHTML = '&rarr;';
  next.onclick = () => shiftDateRange(1);
  elements.dateBar.appendChild(next);
}

function shiftDateRange(days) {
  let d = new Date(AppState.currentDate + 'T00:00:00');
  d.setDate(d.getDate() + days);
  AppState.currentDate = d.toISOString().split('T')[0];
  setupDateBar();
  fetchMatches();
}

function setupTabs() {
  elements.tabsContainer.innerHTML = '';
  const tracks = ['all', 'live', 'scheduled', 'completed'];
  tracks.forEach(t => {
    const btn = document.createElement('button');
    btn.className = `tab ${AppState.currentTab === t ? 'active' : ''}`;
    btn.innerHTML = t === 'live' ? '<span class="lv">●</span> Live Now' : t.charAt(0).toUpperCase() + t.slice(1);
    btn.onclick = () => { AppState.currentTab = t; setupTabs(); renderMatchesGrid(); };
    elements.tabsContainer.appendChild(btn);
  });
}

function setupPicksTabs() {
  elements.dateBar.innerHTML = '';
  elements.bubblesContainer.innerHTML = '';
  elements.tabsContainer.innerHTML = '';
  
  const categories = ['free', 'best'];
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = `tab ${AppState.currentView === cat ? 'active' : ''}`;
    btn.textContent = cat === 'free' ? '⭐ Free Picks Feed' : '👑 Best Bet Targets';
    btn.onclick = () => switchView(cat);
    elements.tabsContainer.appendChild(btn);
  });
}

// --- WEB SOCKET SYNC LAYER ---
function connectWebSocketEngine() {
  if (AppState.ws) AppState.ws.close();

  const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
  AppState.ws = new WebSocket(`${wsProtocol}${window.location.host}/ws/live`);

  AppState.ws.onmessage = function(event) {
    try {
      const payload = JSON.parse(event.data);
      if (AppState.currentView === 'sport' && payload.sport === AppState.currentSport && payload.date === AppState.currentDate) {
        let idx = AppState.matches.findIndex(m => m.match_id === payload.match.match_id);
        if (idx !== -1) {
          AppState.matches[idx] = payload.match;
        } else {
          AppState.matches.push(payload.match);
        }
        renderBubblesMetrics();
        renderMatchesGrid();
      }
    } catch(err) {
      console.error("WebSocket payload operational processing fault:", err);
    }
  };

  AppState.ws.onclose = function() {
    setTimeout(connectWebSocketEngine, 7000);
  };
}

// --- GLOBAL EVENT REGISTRATIONS ---
elements.menuBtn.onclick = (e) => { e.stopPropagation(); elements.menu.classList.toggle('open'); };
document.addEventListener('click', () => elements.menu.classList.remove('open'));

elements.menu.querySelectorAll('.menu-item').forEach(item => {
  item.onclick = (e) => {
    const targetSport = item.getAttribute('data-sport');
    const targetView = item.getAttribute('data-view');
    
    if (targetSport) switchView('sport', targetSport);
    else if (targetView) switchView(targetView);
  };
});

elements.homeLink.onclick = () => switchView('home');

// --- SYSTEM BOOTSTRAPPING INITIALIZATION ---
switchView('home');
connectWebSocketEngine();
</script>
</body>
</html>
