<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Line Logic — Sports Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesque:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e1014;--panel:#171a20;--panel-2:#1e222a;--panel-3:#262b35;--line:#2f3540;
    --ink:#eef1f5;--muted:#9aa3b0;--muted-2:#6b7382;--clay:#e2683a;--clay-bright:#ff7d47;
    --grass:#4f9d6a;--win:#5fc88a;--loss:#e2685f;--live:#ff7d47;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(130% 80% at 82% -8%,#1c160f 0%,var(--bg) 55%);
    color:var(--ink);font-family:"Hanken Grotesque",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  .shell{max-width:1180px;margin:0 auto;padding:34px 20px 90px;display:grid;
    grid-template-columns:248px 1fr;gap:26px}
  @media(max-width:820px){.shell{grid-template-columns:1fr;gap:14px}.side{order:2}}
  header.top{grid-column:1/-1;display:flex;align-items:baseline;justify-content:space-between;gap:14px}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(30px,6vw,48px);letter-spacing:-.02em;margin:0;cursor:pointer}
  h1 .dot{color:var(--clay)}
  .acc-badge{display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;padding:9px 14px}
  .acc-badge .ring{font-family:"Fraunces",serif;font-weight:900;font-size:22px;color:var(--clay-bright);line-height:1}
  .acc-badge .lab{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:1.4}
  .side{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:16px;padding:16px;align-self:start;position:sticky;top:20px}
  .side h3{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin:2px 0 12px}
  .t-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;cursor:pointer;
    font-size:13.5px;transition:.12s;margin-bottom:2px}
  .t-item:hover{background:var(--panel-3)}
  .t-item.active{background:var(--clay);color:#0e1014;font-weight:600}
  .t-item .dotmark{width:7px;height:7px;border-radius:50%;background:var(--clay);flex:none}
  .t-item.active .dotmark{background:#0e1014}
  .t-item .cnt{margin-left:auto;font-family:"Space Mono",monospace;font-size:11px;color:var(--muted)}
  .t-item.active .cnt{color:#0e1014}
  .t-item .livedot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite;flex:none}
  .datebar{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .arrow{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:15px}
  .pill{background:transparent;border:1px solid var(--line);color:var(--muted);padding:6px 11px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
  .pill.active{background:var(--clay);border-color:var(--clay);color:#0e1014}
  .pill .d2{display:block;font-family:"Space Mono",monospace;font-size:9.5px;opacity:.7;margin-top:1px}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600}
  .tab.active{background:var(--panel-3);border-color:#56442f;color:var(--ink)}
  .tab .lv{color:var(--live)}
  .bubbles{display:flex;gap:12px;margin-bottom:18px}
  .bubble{flex:1;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center}
  .bubble .num{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(22px,5vw,32px);line-height:1}
  .bubble .lab{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .bubble.won .num{color:var(--win)} .bubble.acc .num{color:var(--clay-bright)}
  .section-h{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted-2);margin:22px 0 10px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:13px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:#4a3b29}
  .card.correct{border-left:3px solid var(--win)} .card.wrong{border-left:3px solid var(--loss)} .card.live{border-left:3px solid var(--live)}
  .card.big{background:linear-gradient(180deg,#221a11,#1b1610)}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .tier{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;letter-spacing:.1em;padding:3px 6px;border-radius:5px;color:#0e1014;background:var(--clay)}
  .tier.WTA{background:#d56fa0}.tier.CHALLENGER{background:var(--grass)}
  .tourn{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .status{margin-left:auto;display:flex;align-items:center;gap:7px;font-family:"Space Mono",monospace;font-size:11px}
  .live-tag{color:var(--live);text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(230,116,58,.6)}70%{box-shadow:0 0 0 8px rgba(230,116,58,0)}100%{box-shadow:0 0 0 0 rgba(230,116,58,0)}}
  .sched{color:var(--muted)}
  .mark{font-size:15px;font-weight:700;width:22px;height:22px;border-radius:50%;display:grid;place-items:center}
  .mark.ok{color:var(--win);background:rgba(139,191,122,.12)}.mark.no{color:var(--loss);background:rgba(210,104,95,.12)}
  .row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:4px 0}
  .pname{font-size:15.5px;font-weight:500}
  .pname .pick{font-size:9px;font-family:"Space Mono",monospace;color:var(--clay-bright);border:1px solid #56442f;border-radius:4px;padding:1px 5px;margin-left:7px;vertical-align:middle}
  .serving::after{content:"\25CF";color:var(--clay-bright);font-size:8px;margin-left:6px;vertical-align:middle}
  .winner{color:var(--win);font-weight:700}
  .sets{font-family:"Space Mono",monospace;font-size:14px;letter-spacing:.14em;font-variant-numeric:tabular-nums}
  .game{font-family:"Space Mono",monospace;font-size:14px;font-weight:700;min-width:26px;text-align:right;color:var(--clay-bright)}
  .pred{display:flex;margin-top:11px;height:24px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .pred .bar{height:100%;display:flex;align-items:center;padding:0 8px;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;white-space:nowrap}
  .pred .a{background:rgba(200,97,47,.26)}.pred .b{background:rgba(255,255,255,.045);color:var(--muted);justify-content:flex-end}
  .lowconf{font-size:9.5px;font-family:"Space Mono",monospace;color:var(--muted-2);border:1px solid var(--line);border-radius:4px;padding:1px 5px}
  .empty{color:var(--muted);text-align:center;padding:46px 0;font-style:italic}
  .detail{grid-column:1/-1;display:none}
  .back{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;margin-bottom:18px}
  .d-head{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
  .d-meta{display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap}
  .d-score{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:3px 0}
  .d-pname{font-family:"Fraunces",serif;font-size:22px;font-weight:600}
  .d-sets{font-family:"Space Mono",monospace;font-size:20px;letter-spacing:.2em}
  .d-pred{display:flex;height:30px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin-top:16px}
  .d-pred .bar{height:100%;display:flex;align-items:center;padding:0 11px;font-family:"Space Mono",monospace;font-size:12.5px;font-weight:700}
  .d-pred .a{background:rgba(200,97,47,.28)}.d-pred .b{background:rgba(255,255,255,.05);color:var(--muted);justify-content:flex-end}
  .d-tabs{display:flex;gap:8px;margin-bottom:14px}
  .d-tab{background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px 18px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600}
  .d-tab.active{background:var(--clay);border-color:var(--clay);color:#0e1014}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px}
  .analysis{font-family:"Fraunces",serif;font-size:16px;line-height:1.6;color:#eef1f5}
  .meta-line{margin-top:16px;font-size:13.5px;color:var(--muted);line-height:1.7}
  .meta-line b{color:var(--ink)}
  .form-pills{display:inline-flex;gap:4px;margin-left:4px}
  .fp{font-family:"Space Mono",monospace;font-size:10px;width:18px;height:18px;border-radius:4px;display:inline-grid;place-items:center}
  .fp.w{background:rgba(139,191,122,.18);color:var(--win)}.fp.l{background:rgba(210,104,95,.16);color:var(--loss)}
  .stat-sec{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted-2);text-align:center;margin:20px 0 12px}
  .stat{margin-bottom:15px}
  .stat-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:5px}
  .stat-top .lab{color:var(--muted);font-size:12px}
  .stat-top .v{font-weight:700;font-variant-numeric:tabular-nums}
  .stat-top .v.dim{color:var(--muted-2);font-weight:400}
  .stat-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--panel-3)}
  .stat-bar .a{background:var(--clay)}.stat-bar .b{background:#5a4632}
  .stat-na{text-align:center;color:var(--muted-2);font-size:12px;font-style:italic;padding:6px 0}
  .note{font-size:11.5px;color:var(--muted-2);line-height:1.6;margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
  footer{grid-column:1/-1;margin-top:30px;color:var(--muted-2);font-size:11px;line-height:1.6;border-top:1px solid var(--line);padding-top:16px}
  .sport-tag{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--clay-bright);border:1px solid #56442f;border-radius:6px;padding:3px 9px;vertical-align:middle}
  .head-right{display:flex;align-items:center;gap:12px}
  .menu-wrap{position:relative}
  .menu-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);font-size:20px;width:44px;height:44px;border-radius:12px;cursor:pointer;line-height:1}
  .menu-btn:hover{border-color:var(--clay)}
  .menu{position:absolute;right:0;top:52px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:6px;min-width:160px;display:none;z-index:30;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .menu.open{display:block}
  .menu-item{padding:11px 14px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600}
  .menu-item:hover{background:var(--panel-3)}
  .menu-item.active{background:var(--clay);color:#0e1014}
  .menu-sec{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);padding:8px 14px 4px}
  .picks-head{font-family:"Fraunces",serif;font-weight:900;font-size:26px;margin:0 0 4px}
  .picks-sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .pick-card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-left:3px solid var(--clay);border-radius:13px;padding:15px 17px;margin-bottom:11px;cursor:pointer;transition:border-color .15s}
  .pick-card:hover{border-color:var(--clay)}
  .pick-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .pick-sport{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;letter-spacing:.08em;padding:3px 7px;border-radius:5px;color:#0e1014;background:var(--clay)}
  .pick-sport.mlb{background:#3f7fc4;color:#fff}.pick-sport.tennis{background:#4f9d6a;color:#fff}
  .pick-prob{margin-left:auto;font-family:"Fraunces",serif;font-weight:900;font-size:22px;color:var(--clay-bright)}
  .pick-name{font-size:16px;font-weight:600;margin-bottom:3px}
  .pick-match{color:var(--muted);font-size:12.5px}
  .pick-reason{font-size:13px;color:var(--ink);margin-top:8px;line-height:1.5;opacity:.9}
  .pick-conf{font-family:"Space Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:5px}
  .pick-conf.high{background:rgba(139,191,122,.16);color:var(--win)}
  .pick-conf.medium{background:rgba(230,116,58,.16);color:var(--clay-bright)}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .lines-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:6px}
  @media(max-width:560px){.lines-grid{grid-template-columns:1fr}}
  .line-box{background:var(--panel-3);border:1px solid var(--line);border-radius:10px;padding:12px}
  .line-box h5{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:0 0 9px}
  .line-row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;padding:3px 0}
  .line-row .od{font-family:"Space Mono",monospace;font-size:11px;color:var(--clay-bright);font-weight:700}
  .line-row.lean{color:var(--ink)}.line-row.lean .lp{color:var(--clay-bright);font-weight:700}
  .prop-row{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;background:var(--panel-3)}
  .prop-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .prop-player{font-weight:600;font-size:15px}
  .prop-label{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:2px 7px}
  .prop-body{display:flex;align-items:center;gap:14px}
  .prop-proj{font-family:"Fraunces",serif;font-weight:900;font-size:26px;color:var(--clay-bright);line-height:1}
  .prop-proj span{display:block;font-family:"Space Mono",monospace;font-size:8.5px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .prop-line{font-size:13.5px;color:var(--muted)}.prop-line b{color:var(--ink);font-size:16px}
  .prop-ou{margin-left:auto;display:flex;gap:7px}
  .prop-ou span{font-family:"Space Mono",monospace;font-size:12px;padding:5px 10px;border-radius:7px;background:var(--panel-2);color:var(--muted)}
  .prop-ou span.hit{background:var(--clay);color:#0e1014;font-weight:700}
  .pred-live{margin-top:10px;font-family:"Space Mono",monospace;font-size:12px;color:var(--clay-bright);background:rgba(200,97,47,.10);border:1px solid rgba(200,97,47,.3);border-radius:8px;padding:8px 11px}
  .pred-live b{color:var(--ink)}
  .pred-live .pl-note{color:var(--muted);font-size:10.5px}
  .wx-chip{font-size:13px;margin-left:6px;cursor:help}
  .rec-banner{display:flex;align-items:center;gap:12px;border-radius:12px;padding:11px 16px;margin:0 0 16px;font-size:13px;border:1px solid var(--line);background:var(--panel-2)}
  .rec-banner b{font-family:"Fraunces",serif;font-size:22px;font-weight:900}
  .rec-banner .rec-pct,.rec-banner .rec-note{color:var(--muted);font-size:12px;margin-left:auto}
  .rec-banner.good{border-color:rgba(91,140,78,.45)}.rec-banner.good b{color:var(--win)}
  .rec-banner.ok{border-color:rgba(200,97,47,.4)}.rec-banner.ok b{color:var(--clay-bright)}
  .rec-banner.bad{border-color:rgba(193,75,60,.4)}.rec-banner.bad b{color:var(--loss)}
  .rec-banner.pending b{color:var(--muted)}
  .picks-head{position:relative}
  .month-badge{float:right;font-family:"Space Mono",monospace;font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:var(--panel-2);margin-top:6px}
  .month-badge small{font-weight:400;opacity:.7;font-size:10px}
  .month-badge.good{color:var(--win);border-color:rgba(91,140,78,.45)}
  .month-badge.ok{color:var(--clay-bright);border-color:rgba(200,97,47,.4)}
  .month-badge.bad{color:var(--loss);border-color:rgba(193,75,60,.4)}
  .month-badge.pending{color:var(--muted-2)}
  .news-sec{font-family:"Fraunces",serif;font-weight:800;font-size:18px;margin:22px 0 12px}
  .inj-team{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:10px}
  .inj-team-name{font-weight:700;font-size:14px;margin-bottom:9px;color:var(--clay-bright)}
  .inj-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:13px;flex-wrap:wrap}
  .inj-player{font-weight:600}
  .inj-pos{color:var(--muted-2);font-family:"Space Mono",monospace;font-size:10px;font-weight:400}
  .inj-status{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:5px}
  .inj-status.out{background:rgba(226,104,95,.18);color:var(--loss)}
  .inj-status.dtd{background:rgba(226,104,58,.18);color:var(--clay-bright)}
  .inj-status.ok{background:var(--panel-3);color:var(--muted)}
  .inj-detail{color:var(--muted);font-size:12px;margin-left:auto}
  .news-item{border-bottom:1px solid var(--line);padding:13px 0}
  .news-h{font-weight:600;font-size:15px;line-height:1.4}
  .news-d{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.5}
  .news-meta{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted-2);margin-top:6px;text-transform:uppercase;letter-spacing:.05em}
  .home{display:none;grid-column:1/-1}
  .home.show{display:block}
  .home-hero{text-align:center;padding:30px 16px 22px}
  .home-hero h2{font-family:"Fraunces",serif;font-weight:900;font-size:38px;margin:0 0 8px;letter-spacing:-.01em}
  .home-hero h2 .dot{color:var(--clay-bright)}
  .home-hero p{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto;line-height:1.6}
  .home-acc{display:inline-flex;align-items:center;gap:8px;margin-top:16px;background:var(--panel-2);border:1px solid var(--line);border-radius:30px;padding:7px 16px;font-size:13px;color:var(--muted)}
  .home-acc b{color:var(--clay-bright);font-family:"Fraunces",serif;font-size:16px}
  .sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:560px;margin:26px auto 0;padding:0 16px}
  .sport-tile{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px 18px;cursor:pointer;transition:border-color .15s,transform .1s;text-align:left;position:relative;overflow:hidden}
  .sport-tile:hover{border-color:var(--clay);transform:translateY(-2px)}
  .sport-tile .emoji{font-size:30px;display:block;margin-bottom:10px}
  .sport-tile .nm{font-family:"Fraunces",serif;font-weight:800;font-size:20px}
  .sport-tile .sub{color:var(--muted);font-size:12px;margin-top:3px}
  .sport-tile .acc-mini{position:absolute;top:16px;right:16px;font-family:"Space Mono",monospace;font-size:12px;color:var(--clay-bright);font-weight:700}
  .sport-tile .acc-mini span{display:block;font-size:8px;color:var(--muted-2);text-align:right;letter-spacing:.06em}
  .home-picks{display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:560px;margin:13px auto 0;padding:0 16px}
  .home-pick-btn{border-radius:16px;padding:20px 18px;cursor:pointer;border:1px solid var(--line);transition:transform .1s,border-color .15s;text-align:left}
  .home-pick-btn:hover{transform:translateY(-2px)}
  .home-pick-btn.free{background:linear-gradient(135deg,rgba(91,140,78,.22),var(--panel-2));border-color:rgba(91,140,78,.4)}
  .home-pick-btn.best{background:linear-gradient(135deg,rgba(200,97,47,.22),var(--panel-2));border-color:rgba(200,97,47,.4)}
  .home-pick-btn .nm{font-family:"Fraunces",serif;font-weight:800;font-size:18px}
  .home-pick-btn .sub{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.4}
  .home-foot{text-align:center;color:var(--muted-2);font-size:11px;max-width:520px;margin:30px auto 10px;padding:0 16px;line-height:1.5}
  @media(max-width:560px){.home-hero h2{font-size:32px}}
  .prop-row{cursor:pointer}
  .ph-wrap{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .ph-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;font-size:12.5px;color:var(--muted)}
  .ph-rate{font-family:"Space Mono",monospace;font-weight:700;color:var(--ink)}
  .ph-chart{display:flex;align-items:flex-end;gap:5px;height:120px;position:relative}
  .ph-bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
  .ph-bar .bar{width:100%;border-radius:4px 4px 0 0;min-height:14px;display:flex;align-items:flex-start;justify-content:center;padding-top:2px;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:#0d0b08}
  .ph-bar .bar.over{background:#3ec77f}.ph-bar .bar.under{background:var(--loss)}
  .ph-bar .lbl{font-family:"Space Mono",monospace;font-size:8px;color:var(--muted-2);margin-top:4px;text-align:center;line-height:1.1}
  .ph-line{position:absolute;left:0;right:0;border-top:2px dashed rgba(243,234,217,.5);pointer-events:none}
  .ph-line span{position:absolute;right:0;top:-8px;font-family:"Space Mono",monospace;font-size:9px;color:var(--muted);background:var(--panel);padding:0 4px}
  /* MLB cards */
  .mlb-card{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin:10px 0 0}
  .mlb-team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .mlb-team img{width:52px;height:52px;object-fit:contain}
  .mlb-team .tname{font-weight:600;font-size:14px}
  .mlb-team .trec{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--muted)}
  .mlb-team .sp{font-size:11.5px;color:var(--muted);line-height:1.3}
  .mlb-team .sp b{color:var(--ink);font-weight:600}
  .mlb-team.win .tname{color:var(--win)}
  .mlb-vs{font-family:"Fraunces",serif;font-size:14px;color:var(--muted-2);display:flex;flex-direction:column;align-items:center;gap:3px}
  .mlb-vs .rs{font-family:"Space Mono",monospace;font-size:22px;font-weight:700;color:var(--ink)}
  .mlb-vs .inn{font-family:"Space Mono",monospace;font-size:10px;color:var(--live)}
  .d-logos{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin:8px 0 4px}
  .d-logos img{width:74px;height:74px;object-fit:contain}
  .fac{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .fac .lab{text-align:center;color:var(--muted);font-size:11.5px;font-family:"Space Mono",monospace;text-transform:uppercase;letter-spacing:.06em}
  .fac .va{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
  .fac .vb{text-align:left;font-weight:600;font-variant-numeric:tabular-nums}
  .proj-runs{margin-top:4px;font-family:"Fraunces",serif;font-weight:900;font-size:24px;color:var(--clay-bright);line-height:1}
  .proj-runs span{display:block;font-family:"Space Mono",monospace;font-size:8.5px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .proj-line{display:flex;align-items:center;justify-content:center;gap:12px;margin:12px 0 2px;
    font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .proj-line .pr{color:var(--ink)}.proj-line .pr b{font-family:"Fraunces",serif;font-size:21px;color:var(--clay-bright);font-weight:900;vertical-align:middle;margin:0 2px}
  .mu-side{margin-bottom:22px}
  .mu-h{font-family:"Fraunces",serif;font-size:17px;font-weight:600;margin-bottom:4px}
  .mu-h span{font-family:"Hanken Grotesque",sans-serif;font-size:13px;color:var(--muted);font-weight:400}
  .bvp-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .bvp-name{font-weight:600}
  .bvp-stat{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);text-align:right;white-space:nowrap}
  .bvp-stat b{color:var(--clay-bright);font-weight:700}
  .bvp-none{font-family:"Space Mono",monospace;font-size:11.5px;color:var(--muted-2);font-style:italic}
  .bvp-note{font-size:11.5px;color:var(--muted-2);margin-bottom:6px}
  .inj-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .inj-name{font-weight:600}
  .inj-pos{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted-2);margin-left:7px;border:1px solid var(--line);border-radius:4px;padding:1px 5px}
  .inj-stat{font-family:"Space Mono",monospace;font-size:11.5px;color:var(--loss);text-align:right}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <h1 id="home-link">Line Logic<span class="dot">.</span> <span class="sport-tag" id="sport-tag"></span></h1>
    <div class="head-right">
      <div class="acc-badge" id="acc-badge" title="Model accuracy, last 30 days">
        <div class="ring" id="acc-ring">&mdash;</div>
        <div class="lab" id="acc-lab">30-day<br>accuracy</div>
      </div>
      <div class="menu-wrap">
        <button class="menu-btn" id="menu-btn" aria-label="Switch sport">&#9776;</button>
        <div class="menu" id="menu">
          <div class="menu-item" data-view="home">&#127968; Home</div>
          <div class="menu-sec">Sports</div>
          <div class="menu-item" data-sport="tennis">&#127934; Tennis</div>
          <div class="menu-item" data-sport="mlb">&#9918; MLB</div>
          <div class="menu-item" data-sport="nba">&#127936; NBA</div>
          <div class="menu-item" data-sport="nfl">&#127944; NFL</div>
          <div class="menu-sec">Picks</div>
          <div class="menu-item" data-view="free">&#11088; Free Picks</div>
          <div class="menu-item" data-view="best">&#128081; Best Bets</div>
          <div class="menu-sec">More</div>
          <div class="menu-item" data-view="news">&#128240; News &amp; Injuries</div>
        </div>
      </div>
    </div>
  </header>
  <section class="home" id="home"></section>
  <aside class="side" id="side"><h3 id="side-h">Tournaments</h3><div id="t-list"></div></aside>
  <main class="main" id="main">
    <div class="datebar" id="datebar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="bubbles" id="bubbles"></div>
    <div id="list"><div class="empty">Loading&hellip;</div></div>
  </main>
  <section class="detail" id="detail"></section>
  <footer>
    Model picks the higher-probability player; &#10003; = pick won, &#10007; = pick lost. Times shown in Central.
    Not betting advice.
  </footer>
</div>
<script>
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function lastName(n){return (n||"").split(" ").pop();}
function wxIcon(txt){const t=(txt||"").toLowerCase();
  if(t.indexOf("thunder")>=0)return "\u26c8\ufe0f";
  if(t.indexOf("rain")>=0||t.indexOf("drizzle")>=0||t.indexOf("shower")>=0)return "\u{1f327}\ufe0f";
  if(t.indexOf("fog")>=0)return "\u{1f32b}\ufe0f";
  if(t.indexOf("overcast")>=0||t.indexOf("cloud")>=0)return "\u2601\ufe0f";
  if(t.indexOf("clear")>=0||t.indexOf("sun")>=0||t.indexOf("mild")>=0)return "\u2600\ufe0f";
  if(t.indexOf("indoor")>=0)return "\u{1f3df}\ufe0f";
  return "\u{1f324}\ufe0f";}
function timeStr(m){if(m.event_time)return m.event_time;const d=new Date(m.scheduled);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
let selected=startOfDay(new Date());
let tabMode="all",tFilter=null,current=[];
const byId={};
let detailId=null,detailTab="analysis",detailTimer=null;
async function getJSON(u){const r=await fetch(u);if(!r.ok)throw 0;return r.json();}
async function loadDay(){try{current=await getJSON("/api/matches?date="+ymd(selected));}catch(e){current=[];}for(const k in byId)delete byId[k];current.forEach(m=>byId[m.id]=m);}
async function loadTournaments(){
  let ts=[];try{ts=await getJSON("/api/tournaments?date="+ymd(selected));}catch(e){}
  const el=document.getElementById("t-list");el.innerHTML="";
  const all=document.createElement("div");all.className="t-item"+(tFilter===null?" active":"");
  all.innerHTML='<span class="dotmark"></span>All tournaments<span class="cnt">'+current.length+'</span>';
  all.onclick=()=>{tFilter=null;render();};el.appendChild(all);
  ts.forEach(t=>{const it=document.createElement("div");it.className="t-item"+(tFilter===t.key?" active":"");
    const live=t.live?'<span class="livedot"></span>':'<span class="dotmark"></span>';
    it.innerHTML=live+'<span class="tourn" style="flex:1">'+t.name+'</span><span class="cnt">'+t.count+'</span>';
    it.onclick=()=>{tFilter=t.key;render();};el.appendChild(it);});
}
let _accData=null;
async function loadAccuracy(){try{_accData=await getJSON("/api/accuracy?days=30");renderAccuracy();}catch(e){}}
function renderAccuracy(){if(!_accData)return;
  // show the CURRENT sport's accuracy when on a sport; overall on picks views
  let stat,label;
  if(view==="sport"&&_accData.by_sport&&_accData.by_sport[sport]){
    stat=_accData.by_sport[sport];label=SPORT_LABEL[sport]+" \u00b7 30d";
  }else{stat=_accData.overall;label="All sports \u00b7 30d";}
  const ring=document.getElementById("acc-ring"),lab=document.getElementById("acc-lab");
  if(ring)ring.textContent=(!stat||stat.accuracy==null)?"\u2014":stat.accuracy+"%";
  if(lab)lab.textContent=label;
  const badge=document.getElementById("acc-badge");
  if(badge&&stat)badge.title="Model: "+(stat.correct||0)+"/"+(stat.picks||0)+" correct over last 30 days ("+label+")";}
function filteredMatches(){return current.filter(m=>{
  if(tFilter!==null&&(m.tournament_key||m.tournament)!==tFilter)return false;
  if(tabMode==="live"&&m.status!=="live")return false;return true;});}
function dayStats(list){let p=0,c=0;list.forEach(m=>{if(m.correct===true||m.correct===false){p++;if(m.correct)c++;}});return{p:p,c:c,acc:p?Math.round(c/p*100):0};}
function renderDatebar(){const bar=document.getElementById("datebar");bar.innerHTML="";
  const prev=document.createElement("button");prev.className="arrow";prev.textContent="\u2039";prev.onclick=()=>{selected=addDays(selected,-1);reload();};bar.appendChild(prev);
  for(let o=-3;o<=3;o++){const d=addDays(startOfDay(new Date()),o);const b=document.createElement("button");b.className="pill"+(ymd(d)===ymd(selected)?" active":"");
    const lab=o===0?"Today":o===-1?"Yest.":o===1?"Tom.":DOW[d.getDay()];
    b.innerHTML=lab+'<span class="d2">'+MON[d.getMonth()]+" "+d.getDate()+'</span>';b.onclick=()=>{selected=d;reload();};bar.appendChild(b);}
  const next=document.createElement("button");next.className="arrow";next.textContent="\u203A";next.onclick=()=>{selected=addDays(selected,1);reload();};bar.appendChild(next);}
function renderTabs(){const liveCount=current.filter(m=>m.status==="live").length;const el=document.getElementById("tabs");el.innerHTML="";
  [["all","All matches"],["live","Live "+(liveCount?'<span class="lv">('+liveCount+')</span>':"")]].forEach(p=>{
    const b=document.createElement("button");b.className="tab"+(tabMode===p[0]?" active":"");b.innerHTML=p[1];b.onclick=()=>{tabMode=p[0];render();};el.appendChild(b);});}
function renderBubbles(){const s=dayStats(filteredMatches());
  document.getElementById("bubbles").innerHTML='<div class="bubble"><div class="num">'+s.p+'</div><div class="lab">Settled</div></div>'+
    '<div class="bubble won"><div class="num">'+s.c+'</div><div class="lab">Correct</div></div>'+
    '<div class="bubble acc"><div class="num">'+(s.p?s.acc+"%":"\u2014")+'</div><div class="lab">Accuracy</div></div>';}
function matchCardHTML(m){const sc=m.score||{},fin=m.status==="finished",live=m.status==="live";let st;
  if(fin&&(m.correct===true||m.correct===false))st='<span class="mark '+(m.correct?'ok':'no')+'">'+(m.correct?"\u2713":"\u2717")+'</span>';
  else if(live)st='<span class="live-tag"><span class="pulse"></span>Live</span>';
  else if(fin)st='<span class="sched">Final</span>';else st='<span class="sched">'+timeStr(m)+'</span>';
  const p=m.prediction||{},pa=p.prob_a==null?0.5:p.prob_a,pb=1-pa;
  const favN=lastName(pa>=0.5?m.player_a:m.player_b),dogN=lastName(pa>=0.5?m.player_b:m.player_a),favP=Math.round(Math.max(pa,pb)*100);
  const pickA=m.predicted_winner==="a",pickB=m.predicted_winner==="b",servA=live&&sc.server==="a",servB=live&&sc.server==="b",wonA=fin&&sc.winner==="a",wonB=fin&&sc.winner==="b";
  const lc=(p.confidence==="low")?'<span class="lowconf">low-confidence</span>':"";const rnd=m.round?" \u00b7 "+m.round:"";
  function nm(nme,pk,sv,wn){return '<span class="pname'+(sv?' serving':'')+(wn?' winner':'')+'">'+nme+(pk?'<span class="pick">PICK</span>':'')+'</span>';}
  return '<div class="card-top"><span class="tier '+m.tier+'">'+m.tier+'</span><span class="tourn">'+m.tournament+rnd+'</span>'+(m.weather?'<span class="wx-chip" title="'+m.weather+'">'+wxIcon(m.weather)+'</span>':"")+lc+'<span class="status">'+st+'</span></div>'+
    '<div class="row">'+nm(m.player_a,pickA,servA,wonA)+'<span class="sets">'+(sc.sets_a||[]).join(" ")+'</span><span class="game">'+(live?sc.game_a:"")+'</span></div>'+
    '<div class="row">'+nm(m.player_b,pickB,servB,wonB)+'<span class="sets">'+(sc.sets_b||[]).join(" ")+'</span><span class="game">'+(live?sc.game_b:"")+'</span></div>'+
    (live?'<div style="margin-top:10px">'+predBarHTML(favN,favP,dogN,100-favP,"live")+'</div>':'<div class="pred"><div class="bar a" style="width:'+(pa>=0.5?pa:pb)*100+'%">'+favN+' '+favP+'%</div><div class="bar b" style="width:'+(pa>=0.5?pb:pa)*100+'%">'+(100-favP)+'% '+dogN+'</div></div>');}
function render(){renderTabs();renderBubbles();loadTournaments();
  const list=document.getElementById("list");const shown=filteredMatches();
  if(!shown.length){list.innerHTML='<div class="empty">No matches here for this day.</div>';return;}
  list.innerHTML="";
  if(tabMode==="all"&&tFilter===null){
    const big=shown.filter(m=>m.status!=="finished").slice().sort((a,b)=>b.prominence-a.prominence).slice(0,3);
    if(big.length){const h=document.createElement("div");h.className="section-h";h.textContent="\u2605 Biggest matches today";list.appendChild(h);
      big.forEach(m=>{const el=document.createElement("div");el.className="card big"+(m.status==="live"?" live":"");el.innerHTML=matchCardHTML(m);el.onclick=()=>openDetail(m.id);list.appendChild(el);});
      const h2=document.createElement("div");h2.className="section-h";h2.textContent="All matches";list.appendChild(h2);}}
  shown.forEach(m=>{const el=document.createElement("div");const fin=m.status==="finished";
    el.className="card"+(fin?(m.correct?" correct":(m.correct===false?" wrong":"")):m.status==="live"?" live":"");
    el.innerHTML=matchCardHTML(m);el.onclick=()=>openDetail(m.id);list.appendChild(el);});}
function showView(detail){document.getElementById("main").style.display=detail?"none":"";
  document.getElementById("side").style.display=(detail||sport==="mlb")?"none":"";document.getElementById("detail").style.display=detail?"block":"none";}
async function openDetail(id){detailId=id;detailTab="analysis";showView(true);location.hash="m"+id;
  document.getElementById("detail").innerHTML='<div class="empty">Loading match&hellip;</div>';await refreshDetail();
  if(detailTimer)clearInterval(detailTimer);detailTimer=setInterval(()=>{if(detailId)refreshDetail(true);},12000);}
function closeDetail(){detailId=null;if(detailTimer)clearInterval(detailTimer);location.hash="";
  if(view==="home"){document.getElementById("detail").style.display="none";document.getElementById("home").classList.add("show");return;}
  showView(false);renderCurrent();}
function renderCurrent(){if(view==="free"||view==="best")renderPicks();else if(view==="news")renderNews();else if(isTeam(sport))renderTeam();else render();}
async function refreshDetail(){let m;try{m=await getJSON("/api/match/"+detailId);}catch(e){return;}if(detailId!==m.id)return;renderDetail(m);}
function formPills(arr){if(!arr||!arr.length)return "";return '<span class="form-pills">'+arr.slice(0,5).map(r=>{const w=r[0]==="W";return '<span class="fp '+(w?'w':'l')+'" title="'+r+'">'+r[0]+'</span>';}).join("")+'</span>';}
function tennisLinesHTML(m){const L=m.lines;if(!L)return "";const pc=v=>Math.round(v*100)+"%";
  const fav=(m.prediction&&m.prediction.prob_a>=0.5)?m.player_a:m.player_b;const favL=fav.split(" ").pop();
  let rows=L.set_scores.map(s=>'<div class="line-row"><span>'+favL+' '+s[0]+'</span><span class="od">'+pc(s[1])+'</span></div>').join("");
  const tg=m.props&&m.props.total_games;
  const tgBox=tg?('<div class="line-box"><h5>Total games '+tg.line+'</h5>'+
      '<div class="line-row"><span>Over</span><span class="od">'+pc(tg.over)+'</span></div>'+
      '<div class="line-row"><span>Under</span><span class="od">'+pc(tg.under)+'</span></div>'+
      '<div class="line-row" style="opacity:.6;font-size:11px"><span>proj games</span><span>'+tg.proj+'</span></div></div>')
    :'<div class="line-box"><h5>Straight sets</h5><div class="line-row"><span>'+favL+' in straights</span><span class="od">'+pc(L.straight_sets)+'</span></div></div>';
  return '<div class="stat-sec" style="margin-top:18px">Model lines &amp; props</div><div class="lines-grid">'+
    '<div class="line-box"><h5>Most likely set scores</h5>'+rows+'</div>'+
    tgBox+
    '<div class="line-box"><h5>Straight sets</h5><div class="line-row"><span>'+favL+'</span><span class="od">'+pc(L.straight_sets)+'</span></div>'+
      '<div class="line-row" style="opacity:.6;font-size:11px"><span>per-set win</span><span>'+pc(L.per_set_win)+'</span></div></div>'+
    '</div>';}
function statRow(lab,a,b,aPct,bPct,na){if(na)return '<div class="stat"><div class="stat-top"><span class="v dim">\u2014</span><span class="lab">'+lab+'</span><span class="v dim">\u2014</span></div><div class="stat-na">not in current data feed</div></div>';
  const aw=aPct==null?50:aPct,bw=bPct==null?50:bPct,tot=(aw+bw)||1;
  return '<div class="stat"><div class="stat-top"><span class="v">'+a+'</span><span class="lab">'+lab+'</span><span class="v">'+b+'</span></div><div class="stat-bar"><div class="a" style="width:'+aw/tot*100+'%"></div><div class="b" style="width:'+bw/tot*100+'%"></div></div></div>';}
function renderDetail(m){const sc=m.score||{},live=m.status==="live",fin=m.status==="finished";
  const p=m.prediction||{},pa=p.prob_a==null?0.5:p.prob_a;const conf=p.confidence||"high";
  const confLabel={high:"High confidence",medium:"Medium confidence",low:"Low confidence"}[conf];
  const rnd=m.round?" \u00b7 "+m.round:"",surf=(m.surface&&m.surface!=="Unknown")?" \u00b7 "+m.surface:"";
  let stat=live?'<span class="live-tag"><span class="pulse"></span>Live</span>':fin?"Final":(m.event_time||"");
  const head='<div class="d-head"><div class="d-meta"><span class="tier '+m.tier+'">'+m.tier+'</span><span class="tourn">'+m.tournament+rnd+surf+'</span><span class="status" style="margin-left:auto">'+stat+'</span></div>'+
    '<div class="d-score"><span class="d-pname '+(fin&&sc.winner==="a"?"winner":"")+'">'+m.player_a+'</span><span class="d-sets">'+(sc.sets_a||[]).join(" ")+" "+(live?"<b>"+sc.game_a+"</b>":"")+'</span></div>'+
    '<div class="d-score"><span class="d-pname '+(fin&&sc.winner==="b"?"winner":"")+'">'+m.player_b+'</span><span class="d-sets">'+(sc.sets_b||[]).join(" ")+" "+(live?"<b>"+sc.game_b+"</b>":"")+'</span></div>'+

let propHistCache={},propsCurrent=null,propsSport=null,propsGameId=null;
function propsPanelHTML(data){
  if(data==="loading"||data===null)return '<div class="panel"><div class="empty">Loading props&hellip;</div></div>';
  const props=data.props||[];
  if(!props.length)return '<div class="panel"><div class="empty">No player props available for this game yet.</div><div class="note">Props appear once season stats (and, for baseball, the announced starters) are posted.</div></div>';
  let rows=props.map((p,i)=>propRowHTML(p,i)).join("");
  return '<div class="panel"><div class="stat-sec">Player props \u2014 model projections</div>'+rows+
    '<div class="note">Tap a prop to see the last-10-game history. Projection = season pace adjusted for matchup; over/under from a model distribution. Lines are the model\u2019s own. High variance \u2014 not betting advice.</div></div>';}
function propRowHTML(p,i){const op=Math.round(p.over_prob*100),up=100-op,lean=p.lean;
  return '<div class="prop-row" onclick="togglePropHist('+i+',this)" data-idx="'+i+'">'+
    '<div class="prop-head"><span class="prop-player">'+p.player+'</span>'+
    '<span class="prop-label">'+(p.label||p.stat)+'</span></div>'+
    '<div class="prop-body"><div class="prop-proj">'+p.projection+'<span>proj</span></div>'+
    '<div class="prop-line">Line <b>'+p.line+'</b></div>'+
    '<div class="prop-ou"><span class="'+(lean==="over"?"hit":"")+'">O '+op+'%</span><span class="'+(lean==="under"?"hit":"")+'">U '+up+'%</span></div></div>'+
    '<div class="ph-host"></div></div>';}
function chartHTML(h){
  if(!h||!h.games||!h.games.length)return '<div class="ph-wrap"><div class="bvp-none">No recent game log available.</div></div>';
  const vals=h.games.map(g=>g.value),mx=Math.max(h.line,...vals)*1.15||1;
  const linePctFromTop=(1-h.line/mx)*100;
  let bars=h.games.map(g=>{const over=g.value>h.line;const ht=Math.max(8,g.value/mx*100);
    return '<div class="ph-bar"><div class="bar '+(over?"over":"under")+'" style="height:'+ht+'%">'+g.value+'</div>'+
      '<div class="lbl">'+(g.opp||"")+(g.date?'<br>'+g.date:"")+'</div></div>';}).join("");
  return '<div class="ph-wrap"><div class="ph-head"><span>Last '+h.total+' \u00b7 line '+h.line+(h.avg!=null?' \u00b7 avg '+h.avg:"")+'</span>'+
    '<span class="ph-rate">'+h.hits+'/'+h.total+' over</span></div>'+
    '<div class="ph-chart"><div class="ph-line" style="top:'+linePctFromTop+'%"><span>'+h.line+'</span></div>'+bars+'</div></div>';}
async function togglePropHist(i,el){
  const host=el.querySelector(".ph-host");
  if(host.dataset.open==="1"){host.innerHTML="";host.dataset.open="0";return;}
  host.dataset.open="1";host.innerHTML='<div class="ph-wrap"><div class="bvp-none">Loading history&hellip;</div></div>';
  const p=(propsCurrent||[])[i];if(!p){return;}
  const key=propsSport+"|"+propsGameId+"|"+p.player+"|"+p.stat+"|"+p.line;
  if(propHistCache[key]){host.innerHTML=chartHTML(propHistCache[key]);return;}
  let h=null;
  try{
    h=await getJSON("/api/"+propsSport+"/prop-history/"+propsGameId+"?player="+encodeURIComponent(p.player)+"&stat="+encodeURIComponent(p.stat)+"&line="+p.line+"&date="+ymd(selected));
  }catch(e){h=null;}
  if(h&&h.games&&h.games.length)propHistCache[key]=h;
  host.innerHTML=chartHTML(h);}
